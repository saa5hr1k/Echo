/* ---------- DAILY TASKS (recurring habits — reset every day) ---------- */
const DAILY_TASK_XP = 50;
function renderDailies(c){
  if(!c) return;
  const today=todayStr();
  c.innerHTML = `<div class="card sys-panel">
    <div class="hd"><div class="label">🔁 Daily Tasks</div><div class="pill">resets daily · +${DAILY_TASK_XP} XP</div></div>
    <div style="display:flex;gap:9px">
      <input id="dailyInput" placeholder="Add a recurring daily task… (e.g. Drink water)" autocomplete="off" />
      <button class="btn" id="addDailyBtn">Add</button>
    </div>
    <div id="dailyList" style="margin-top:16px">
      ${S.dailies.length ? S.dailies.map(d=>dailyRowHTML(d,today)).join("") : `<div class="empty">No daily tasks yet. Add habits you want to repeat every day — they come back each morning.</div>`}
    </div>
  </div>`;
  const inp=$("#dailyInput");
  const add=()=>{ const v=inp.value.trim(); if(!v) return; S.dailies.push({id:"dl"+Date.now(), title:v, lastDone:null, streak:0, best:0}); inp.value=""; save(); renderPage(); $("#dailyInput")?.focus(); };
  $("#addDailyBtn").onclick=add;
  inp.onkeydown=e=>{ if(e.key==="Enter") add(); };
  $$("#dailyList [data-daily]").forEach(b=>b.onclick=()=>completeDaily(b.dataset.daily));
  $$("#dailyList [data-dailydel]").forEach(b=>b.onclick=()=>{ S.dailies=S.dailies.filter(d=>d.id!==b.dataset.dailydel); save(); renderPage(); });
}
function dailyRowHTML(d, today){
  const done = d.lastDone===today;
  return `<div class="task-row ${done?'done':''}">
    <button class="t-check" data-daily="${d.id}" ${done?'disabled':''} title="${done?'Done today — back tomorrow':'Mark done for today'}">${done?'✓':''}</button>
    <div class="t-title">${esc(d.title)}</div>
    ${d.streak?`<span class="t-streak" title="${d.streak}-day streak">🔥 ${d.streak}</span>`:""}
    <button class="t-del" data-dailydel="${d.id}" title="Remove">✕</button>
  </div>`;
}
function completeDaily(id){
  const d=S.dailies.find(x=>x.id===id); if(!d) return;
  const today=todayStr();
  if(d.lastDone===today) return; // already done today
  const last=d.lastDone?new Date(d.lastDone):null, now=new Date(today);
  if(last){ const days=Math.round((now-last)/86400000); d.streak = days===1 ? (d.streak||0)+1 : 1; }
  else d.streak=1;
  d.lastDone=today; d.best=Math.max(d.best||0, d.streak);
  S.stats.bestHabitStreak=Math.max(S.stats.bestHabitStreak||0, d.streak);
  withLevelCheck(()=>{
    bumpStreak();
    S.stats.tasksDone++;
    creditXP(DAILY_TASK_XP, "discipline");
    updateQuest("d_task", 1);
    logActivity("Daily: "+d.title, DAILY_TASK_XP);
  });
  maybePerfectDay(); checkAchievements();
  save(); render();
  sfx("complete");
  toast("✅","Daily done!", d.title+" · +"+DAILY_TASK_XP+" XP"+(d.streak>1?` · 🔥 ${d.streak}`:""));
}

function dungeonCardHTML(g){
  const subs=g.subtasks||[];
  const total=subs.length, done=subs.filter(s=>s.done).length;
  const pct=total?Math.round(done/total*100):0;
  const cleared=g.defeated || (total>0 && done===total);
  return `<div class="dungeon sys-panel ${cleared?'cleared':''}">
    <div class="dg-head">
      <div class="dg-ic">${cleared?'☠️':(g.icon||'🏰')}</div>
      <div class="dg-info">
        <div class="dg-top"><span class="dg-nm">${esc(g.title)}</span><span class="dg-reward">${cleared?'CONQUERED':'+150 XP'}</span></div>
        <div class="dg-hp"><i style="width:${cleared?100:pct}%"></i></div>
        <div class="dg-sub-line"><span>${cleared?'Dungeon conquered':(total?done+' / '+total+' milestones cleared':'No milestones yet — add some below')}</span><span>${pct}%</span></div>
      </div>
      <button class="dg-del" data-deld="${g.id}" title="Delete dungeon">✕</button>
    </div>
    <div class="dg-subs">
      ${subs.map(s=>`<div class="dg-sub ${s.done?'done':''}">

      </div>`).join("")}
      ${cleared?'':`<div class="dg-addsub"><input class="dg-subinput" data-addsubfor="${g.id}" placeholder="Add a milestone…" autocomplete="off"><button class="btn dg-addbtn" data-addsubbtn="${g.id}">Add</button></div>`}
    </div>
  </div>`;
}

function completeSubtask(gid, sid){
  const g=S.goals.find(x=>x.id===gid); if(!g) return;
  const s=(g.subtasks||[]).find(x=>x.id===sid); if(!s||s.done) return;
  s.done=true;
  withLevelCheck(()=>{
    bumpStreak();
    creditXP(40, "discipline");
    logActivity("Milestone: "+s.title, 40);
    const total=g.subtasks.length, done=g.subtasks.filter(x=>x.done).length;
    if(total>0 && done===total && !g.defeated){
      g.defeated=true; S.stats.bossesDefeated++;
      creditXP(150);
      logActivity("Dungeon conquered: "+g.title, 150);
      setTimeout(()=>{ sfx("boss"); toast("🏰","DUNGEON CONQUERED!", g.title+" · +150 XP bounty"); setMood("proud", `You conquered "${g.title}", ${S.profile.name}! That's a major milestone. 🏆`); }, 450);
    }
  });
  checkAchievements();
  save(); render();
  if(!g.defeated){ sfx("ding"); toast("⚔️","Milestone cleared!", s.title+" · +40 XP"); }
}
function addSubtask(gid){
  const inp=$(`[data-addsubfor="${gid}"]`); if(!inp) return;
  const v=inp.value.trim(); if(!v) return;
  const g=S.goals.find(x=>x.id===gid); if(!g) return;
  g.subtasks=g.subtasks||[]; g.subtasks.push({id:"s"+Date.now(), title:v, done:false});
  save(); renderPage();
  const again=$(`[data-addsubfor="${gid}"]`); if(again) again.focus();
}

function equipTitle(slot, id){
  if(!S.titles.unlocked.includes(id)) return;
  if(slot==="primary"){ if(S.titles.secondary===id) S.titles.secondary=null; S.titles.primary = (S.titles.primary===id)?null:id; }
  else { if(S.titles.primary===id) S.titles.primary=null; S.titles.secondary = (S.titles.secondary===id)?null:id; }
  save(); renderDashboard();
}
function toggleFavTitle(id){
  if(!S.titles.unlocked.includes(id)) return;

function companionBubble(){
  const lf=levelFromTotal(S.rpg.totalXP), xpLeft=lf.need-lf.intoLevel, name=S.profile.name;
  const lines=[`A new challenge is available whenever you're ready, ${name}.`, `I'm watching your progress. It's trending upward.`];
  if(xpLeft<=70) lines.unshift(`Just ${xpLeft} XP until level ${lf.level+1}. One more push.`);
  if(S.streak.current>=3) lines.unshift(`Your ${S.streak.current}-day streak is impressive. Keep it alive.`);
  const aq=getActiveQuest(); if(aq.pct>0&&aq.pct<100) lines.unshift(`"${aq.label}" is ${aq.pct}% complete — so close.`);
  const dg=(S.goals||[]).find(g=>!dungeonProgress(g).cleared); if(dg) lines.push(`The dungeon "${dg.title}" awaits. Clear a milestone to make progress.`);
  return lines[Math.floor(Math.random()*Math.min(lines.length,3))] || lines[0];
}
function heroParticles(canvas){
  const ctx=canvas.getContext("2d"); let raf,W=0,H=0,parts=[];
  function resize(){ const r=canvas.getBoundingClientRect(); W=canvas.width=r.width; H=canvas.height=Math.max(1,r.height); }
  resize();
  for(let i=0;i<46;i++) parts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.6+0.4,s:Math.random()*0.32+0.08,a:Math.random()*0.4+0.12});
  function frame(){
    ctx.clearRect(0,0,W,H); ctx.shadowColor="rgba(120,210,255,0.8)"; ctx.shadowBlur=7;
    for(const p of parts){ p.y-=p.s; if(p.y<-6){ p.y=H+6; p.x=Math.random()*W; }
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.2832); ctx.fillStyle=`rgba(140,215,255,${p.a})`; ctx.fill(); }
    raf=requestAnimationFrame(frame);
  }
  frame();
  const onR=()=>resize(); window.addEventListener("resize",onR);
  return ()=>{ cancelAnimationFrame(raf); window.removeEventListener("resize",onR); };
}

function startSession(typeId, minutes, task){
  sfx("start");
  const type=SESSION_TYPES.find(t=>t.id===typeId);
  const total=minutes*60;
  let remaining=total;
  let lastCoach=-1;
  const m=$("#modal");
  const R=120, C=2*Math.PI*R;
  m.innerHTML = `
    <div class="timer-stage">
      <div class="orb-wrap"><div class="orb mood-focus" id="sessOrb" style="width:64px;height:64px"></div></div>
      <div class="label" style="margin-top:6px">${type.em} ${type.nm}</div>
      <div class="focus-task">${esc(task)}</div>
      <div class="ring-wrap">
        <svg width="260" height="260" viewBox="0 0 260 260">
          <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#38e1ff"/><stop offset="1" stop-color="#4f8cff"/></linearGradient></defs>
          <circle class="ring-bg" cx="130" cy="130" r="${R}"></circle>
          <circle class="ring-fg" id="ringFg" cx="130" cy="130" r="${R}" stroke-dasharray="${C}" stroke-dashoffset="0"></circle>
        </svg>
        <div class="ring-center"><div class="time" id="timeTxt">${fmt(remaining)}</div><div class="ph">remaining</div></div>
      </div>
      <div class="coach-bubble" id="coach">${esc(S.profile.companionName)} is with you. Let's lock in — just this one thing. 💫</div>
      <div class="timer-controls">
        <button class="btn" id="pauseBtn">⏸ Pause</button>
        <button class="btn btn-ghost" id="giveUp">End early</button>
      </div>
    </div>`;
  $("#overlay").classList.add("show");

  const coachLines=[
    `You're doing great — stay with it. 💫`,
    `Notice a distraction? Gently come back. I'm here.`,
    `This is exactly how progress is built. Keep going.`,
    `Halfway energy! You've got real momentum now.`,
    `Future you is grateful for this right now.`,
    `Breathe. One line, one rep, one page at a time.`,
  ];
  function tick(){
    remaining--;
    $("#timeTxt").textContent=fmt(remaining);
    $("#ringFg").style.strokeDashoffset = C*(1 - remaining/total);
    const elapsedFrac=1-remaining/total;
    const seg=Math.floor(elapsedFrac*coachLines.length);
    if(seg!==lastCoach && remaining>0){ lastCoach=seg; const c=$("#coach"); if(c){c.style.animation="none";void c.offsetWidth;c.style.animation="fadeUp .4s ease";c.textContent=coachLines[seg%coachLines.length];} }
    if(remaining<=0){ clearInterval(timer); timer=null; completeSession(type, minutes, task); }
  }
  timer=setInterval(tick,1000);

  let paused=false;
  $("#pauseBtn").onclick=()=>{
    paused=!paused;
    if(paused){ clearInterval(timer); timer=null; $("#pauseBtn").textContent="▶ Resume"; $("#coach").textContent="Paused — take your time. I'll be right here."; }
    else { timer=setInterval(tick,1000); $("#pauseBtn").textContent="⏸ Pause"; }
  };
  $("#giveUp").onclick=()=>{
    if(timer){clearInterval(timer);timer=null;}
    const done=total-remaining;
    closeOverlay();
    if(done>=60){
      const mins=Math.floor(done/60);
      const xp=Math.round(mins*1.5);
      handleSessionRewards(type, mins, xp, task, true);
    }else{
      setMood("happy", "No worries — even starting counts. Want to try a shorter one?");
      toast("🌱","Session ended","No XP this time, but showing up matters. Try again?");
    }
  };
}

function completeSession(type, minutes, task){
  closeOverlay();
  const xp=50 + (minutes>=45?20:0) + (minutes>=60?20:0);

function handleSessionRewards(type, minutes, xp, task, early){
  // one transaction: streak + all quest rewards + session XP, so a level-up
  // from ANY of these sources triggers exactly one celebration.
  withLevelCheck(()=>{
    bumpStreak();
    S.stats.sessions++;
    S.stats.focusMinutes=(S.stats.focusMinutes||0)+minutes;
    S.stats.longestSession=Math.max(S.stats.longestSession||0, minutes);
    const hr=new Date().getHours();
    if(hr>=0 && hr<5) S.stats.nightSessions=(S.stats.nightSessions||0)+1;
    if(hr>=4 && hr<8) S.stats.earlySessions=(S.stats.earlySessions||0)+1;
    updateQuest("d_session", 1);
    updateQuest("d_focus20", minutes);
    updateQuest("w_5sessions", 1);
    // split XP: 60% to the session's attribute, 40% to Focus (every session trains focus)
    const focusXP = Math.round(xp*0.4), mainXP = xp-focusXP;
    creditXP(mainXP, type.skill);
    creditXP(focusXP, "focus");
    logActivity((early?"Partial ":"")+type.nm+" session", xp);
  });
  maybePerfectDay();
  checkAchievements();
  render(); // full refresh to update everything
  setMood("proud", `${minutes} minutes of real focus, ${S.profile.name}! That's +${xp} XP. I'm proud of you. 🌟`);
  sfx("sessioncomplete");
  toast("🎉","Session complete!", `+${xp} XP · ${minutes} min of ${type.nm.toLowerCase()}`);
}

/* ============================================================
   AWAKENING SEQUENCE — cinematic system-onboarding (original IP)
   ============================================================ */
const sleep = ms => new Promise(r=>setTimeout(r, ms));
let awkSkip = false;
let _awkSkipResolve = null;
// interruptible sleep: resolves instantly once Skip is pressed, so the
// sequence fast-forwards immediately instead of waiting out each timer.
function awkSleep(ms){
  if(awkSkip) return Promise.resolve();
  return new Promise(res=>{
    const t=setTimeout(()=>{ _awkSkipResolve=null; res(); }, ms);
    _awkSkipResolve=()=>{ clearTimeout(t); _awkSkipResolve=null; res(); };
  });
}
function awkDoSkip(){ awkSkip=true; if(_awkSkipResolve) _awkSkipResolve(); }
let awkAudio = null;

function startAwkAudio(){
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext; if(!Ctx) return;
    const ac = new Ctx();
    const master = ac.createGain(); master.gain.value = 0.0001; master.connect(ac.destination);
    // low ambient drone (two slightly-detuned sines)
    const o1=ac.createOscillator(), o2=ac.createOscillator(), dg=ac.createGain();
    o1.type="sine"; o2.type="sine"; o1.frequency.value=55; o2.frequency.value=82.5;
    dg.gain.value=0.5; o1.connect(dg); o2.connect(dg); dg.connect(master);
    o1.start(); o2.start();
    master.gain.linearRampToValueAtTime(0.05, ac.currentTime+2.2);
    if(ac.state==="suspended") ac.resume();
    awkAudio={ac, master};
  }catch(e){}
}
function awkBlip(freq){
  try{
    if(!awkAudio) return; const {ac,master}=awkAudio;
    const o=ac.createOscillator(), g=ac.createGain();
    o.type="triangle"; o.frequency.value=freq||760; o.connect(g); g.connect(master);
    const t=ac.currentTime; g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(0.6, t+0.012); g.gain.exponentialRampToValueAtTime(0.0005, t+0.28);
    o.start(t); o.stop(t+0.32);
  }catch(e){}
}
function stopAwkAudio(){
  try{ if(!awkAudio) return; const {ac,master}=awkAudio;
    master.gain.linearRampToValueAtTime(0.0001, ac.currentTime+1.1);
    setTimeout(()=>{ try{ac.close();}catch(e){} }, 1300); awkAudio=null;
  }catch(e){}
}
function awkParticleField(canvas){
  const ctx=canvas.getContext("2d"); let raf, W=0,H=0, parts=[];
  function resize(){ const r=canvas.getBoundingClientRect(); W=canvas.width=r.width; H=canvas.height=r.height; }
  resize();
  for(let i=0;i<80;i++) parts.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.8+0.4, s:Math.random()*0.5+0.12, a:Math.random()*0.5+0.18});
  function frame(){
    ctx.clearRect(0,0,W,H);
    ctx.shadowColor="rgba(120,210,255,0.9)"; ctx.shadowBlur=8;
    for(const p of parts){
      p.y-=p.s; if(p.y<-6){ p.y=H+6; p.x=Math.random()*W; }
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.2832);
      ctx.fillStyle=`rgba(140,215,255,${p.a})`; ctx.fill();
    }
    raf=requestAnimationFrame(frame);
  }
  frame();
  const onResize=()=>resize(); window.addEventListener("resize", onResize);
  return ()=>{ cancelAnimationFrame(raf); window.removeEventListener("resize", onResize); };
}

    spot.style.width=Math.min(vw-12, r.width+pad*2)+"px";
    spot.style.height=(r.height+pad*2)+"px";
    const cw=card.offsetWidth, ch=card.offsetHeight;
    let top;
    if(r.bottom+16+ch <= vh) top=r.bottom+16;
    else if(r.top-16-ch >= 0) top=r.top-16-ch;
    else top=Math.max(12,(vh-ch)/2);
    const left=Math.min(Math.max(12, r.left), vw-cw-12);
    card.style.top=top+"px"; card.style.left=left+"px";
  }, 360);
}

  m.innerHTML=`
    <button class="btn icon-btn close" id="closeSet">✕</button>
    <div class="label">Settings</div>
    <div class="h2" style="margin-top:6px">Your Echo</div>
    <div style="margin-top:18px">
      <div class="set-row">
        <div><div style="font-weight:600">Your name</div><div class="sd">How Echo addresses you</div></div>
        <input id="setName" value="${esc(S.profile.name)}" style="width:170px" />
      </div>
      <div class="set-row">
        <div><div style="font-weight:600">Companion name</div><div class="sd">What you call your companion</div></div>
        <input id="setComp" value="${esc(S.profile.companionName)}" style="width:170px" />
      </div>
      <div class="set-row">
        <div><div style="font-weight:600">AI brain</div><div class="sd">Built in — your companion & coach are powered by live AI automatically. ● Active</div></div>
      </div>
      <div class="set-row" style="margin-top:8px">
        <div><div style="font-weight:600">Sound effects</div><div class="sd">Clicks, completions, level-ups and more.</div></div>
        <button class="btn btn-ghost" id="sfxToggle">${sfxOn?"🔊 On":"🔇 Off"}</button>
      </div>
      <div class="set-row">
        <div><div style="font-weight:600">Replay guided tour</div><div class="sd">Walk through how the System works again.</div></div>
        <button class="btn btn-ghost" id="replayTour">▶ Tour</button>
      </div>
      <div class="set-row">
        <div><div style="font-weight:600">Replay Awakening</div><div class="sd">Watch the cinematic awakening sequence again.</div></div>
        <button class="btn btn-ghost" id="replayAwk">▶ Replay</button>
      </div>
      <div class="set-row">
        <div><div style="font-weight:600" class="danger">Reset everything</div><div class="sd">Wipes your profile, XP, and progress on this device.</div></div>
        <button class="btn btn-ghost danger" id="resetBtn">Reset</button>
      </div>
    </div>
    <button class="btn btn-primary btn-lg" style="width:100%;margin-top:20px" id="saveSet">Save</button>`;
  ov.classList.add("show");
  $("#closeSet").onclick=closeOverlay;
  $("#replayAwk").onclick=()=>{ closeOverlay(); runAwakening(false); };
  $("#sfxToggle").onclick=()=>{ sfxOn=!sfxOn; localStorage.setItem("echo_sfx", sfxOn?"1":"0"); $("#sfxToggle").textContent=sfxOn?"🔊 On":"🔇 Off"; if(sfxOn) sfx("toggle"); };
  $("#replayTour").onclick=()=>{ closeOverlay(); activePage="dashboard"; render(); setTimeout(()=>startTour(), 400); };
  $("#saveSet").onclick=()=>{
    S.profile.name=$("#setName").value.trim()||S.profile.name;
    S.profile.companionName=$("#setComp").value.trim()||S.profile.companionName;
    save(); closeOverlay(); render();
    toast("✓","Saved","Your settings are updated.");
  };
  $("#resetBtn").onclick=()=>{
    if(confirm("Reset Echo? This erases all your progress on this device.")){
      localStorage.removeItem(STORE_KEY); S=null; onb={step:0,name:"",username:"",email:"",dob:"",password:"",avatar:"aurora",companionName:"Aurora",goals:[]};
      closeOverlay(); render();
    }
  };
}

/* ============================================================
   UTIL
   ============================================================ */
function closeOverlay(){ $("#overlay").classList.remove("show"); if(timer){clearInterval(timer);timer=null;} }
function fmt(s){ s=Math.max(0,s); const m=Math.floor(s/60), ss=s%60; return `${m}:${ss<10?"0":""}${ss}`; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function timeAgo(ts){
  const d=Math.floor((Date.now()-ts)/1000);
  if(d<60) return "just now";
  if(d<3600) return Math.floor(d/60)+"m ago";
  if(d<86400) return Math.floor(d/3600)+"h ago";
  return Math.floor(d/86400)+"d ago";
}
function toast(icon,title,desc){
  const wrap=$("#toasts");
  const t=document.createElement("div"); t.className="toast";
  t.innerHTML=`<span class="ti">${icon}</span><div><div class="tt">${esc(title)}</div>${desc?`<div class="td">${esc(desc)}</div>`:""}</div>`;
  wrap.appendChild(t);
  setTimeout(()=>{ t.style.transition="opacity .4s,transform .4s"; t.style.opacity="0"; t.style.transform="translateX(40px)"; setTimeout(()=>t.remove(),420); }, 3600);
}

// close overlays on backdrop click / esc
$("#overlay").addEventListener("click",e=>{ if(e.target.id==="overlay" && !timer) closeOverlay(); });
$("#chatOverlay").addEventListener("click",e=>{ if(e.target.id==="chatOverlay") closeChat(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ if(!timer) closeOverlay(); closeChat(); } });

// global UI click sound (also unlocks the audio context on first gesture).
// Skips elements that already play a dedicated sound (nav, checkboxes).
document.addEventListener("pointerdown", e=>{
  sfxInit();
  const t=e.target; if(!t.closest) return;
  if(t.closest(".t-check, .dg-check, .nav-item")) return;
  const el=t.closest("button, .btn, .qa-card, .tab, .goal-chip, .avatar-opt, .type-opt, .dur-opt, .dg-iconopt, .tc-fav, select");
  if(el && !el.disabled) sfx("tap");
}, true);

/* boot */
// Developer mode: visiting with ?dev unlocks developer-exclusive content (e.g. the Limitless skin).
if(location.search.indexOf("dev")!==-1){
  localStorage.setItem("echo_dev","1");
  if(S){ S.dev=true; save(); }
  history.replaceState(null,"",location.pathname);
}
// Visiting with ?reset wipes all saved data so you can experience Echo from scratch.
if(location.search.indexOf("reset")!==-1){
  try{ localStorage.removeItem(STORE_KEY); }catch(e){}
  S=null;
  onb={step:0,name:"",username:"",email:"",dob:"",password:"",avatar:"aurora",companionName:"Aurora",goals:[]};
  history.replaceState(null,"",location.pathname); // drop ?reset from the URL
}
render();
</script>
</body>
</html>
