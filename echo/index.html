<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Echo — Your AI Body Double</title>
<!-- installable app (PWA): icon, theme, manifest, offline support -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#070a12" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Echo" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<script>
if("serviceWorker" in navigator){ window.addEventListener("load", ()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
<style>
/* ============================================================
   ECHO — premium AI body-double RPG companion
   Single-file app. Dark, glassmorphism, Apple-inspired.
   ============================================================ */
:root{
  --bg:#070a12;
  --bg-2:#0b1020;
  --panel:rgba(255,255,255,.045);
  --panel-2:rgba(255,255,255,.07);
  --stroke:rgba(255,255,255,.10);
  --stroke-2:rgba(255,255,255,.16);
  --txt:#eaf0ff;
  --txt-dim:#9fb0cf;
  --txt-faint:#6b7a99;
  --cyan:#38e1ff;
  --blue:#4f8cff;
  --teal:#2dd4bf;
  --amber:#ffc24b;
  --green:#46e6a0;
  --pink:#ff7eb6;
  --grad:linear-gradient(135deg,#38e1ff 0%,#4f8cff 60%,#7aa2ff 100%);
  --grad-amber:linear-gradient(135deg,#ffd27a,#ffab3d);
  --shadow:0 20px 60px rgba(0,0,0,.45);
  --radius:22px;
  --radius-sm:14px;
  font-synthesis:none;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(180deg,#0a0e18 0%,#070a12 55%) fixed;
  color:var(--txt);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  letter-spacing:.1px;
}
::selection{background:rgba(56,225,255,.3)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}
a{color:var(--cyan);text-decoration:none}
.hidden{display:none !important}

/* scrollbar */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:10px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.22);background-clip:content-box}

/* ---------- shared ---------- */
.glass{
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:var(--radius);
  backdrop-filter:blur(22px) saturate(140%);
  -webkit-backdrop-filter:blur(22px) saturate(140%);
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:9px;
  padding:13px 22px;border-radius:14px;font-weight:600;font-size:15px;
  background:var(--panel-2);border:1px solid var(--stroke-2);color:var(--txt);
  transition:transform .15s ease, background .2s, border-color .2s, box-shadow .25s;
}
.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.28)}
.btn:active{transform:translateY(0)}
.btn-primary{
  background:var(--grad);color:#04121f;border:none;font-weight:700;
  box-shadow:0 10px 30px rgba(56,140,255,.35);
}
.btn-primary:hover{box-shadow:0 14px 40px rgba(56,140,255,.5);background:var(--grad)}
.btn-ghost{background:transparent;border:1px solid var(--stroke)}
.btn-lg{padding:16px 28px;font-size:16px;border-radius:16px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.pill{font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;background:var(--panel-2);border:1px solid var(--stroke);color:var(--txt-dim)}
.label{font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--txt-faint)}

input,textarea{
  width:100%;background:rgba(0,0,0,.25);border:1px solid var(--stroke);
  color:var(--txt);border-radius:13px;padding:14px 16px;font-size:15px;outline:none;
  transition:border-color .2s, box-shadow .2s, background .2s;
}
input:focus,textarea:focus{border-color:rgba(56,225,255,.55);box-shadow:0 0 0 4px rgba(56,225,255,.12);background:rgba(0,0,0,.32)}
input::placeholder,textarea::placeholder{color:var(--txt-faint)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.fade-up{animation:fadeUp .55s cubic-bezier(.2,.7,.2,1) both}
.fade-in{animation:fadeIn .5s ease both}

/* ============================================================
   COMPANION ORB — a modern AI entity, not a mascot
   ============================================================ */
.orb-wrap{position:relative;display:inline-grid;place-items:center}
.orb{
  position:relative;border-radius:50%;
  background:
    radial-gradient(closest-side at 38% 32%, #eafaff 0%, var(--cyan) 30%, var(--blue) 70%, #2a4bd0 100%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.18) inset,
    0 0 40px rgba(56,225,255,.45),
    0 0 90px rgba(79,140,255,.35),
    0 18px 50px rgba(0,0,0,.5);
  transition:transform .5s cubic-bezier(.2,.8,.2,1), box-shadow .5s;
  animation:orbFloat 6s ease-in-out infinite;
}
.orb::before{ /* inner swirl */
  content:"";position:absolute;inset:8%;border-radius:50%;
  background:conic-gradient(from 0deg, rgba(255,255,255,.0), rgba(255,255,255,.35), rgba(255,255,255,0) 50%, rgba(56,225,255,.4), rgba(255,255,255,0));
  mix-blend-mode:screen;animation:spin 9s linear infinite;opacity:.7;
}
.orb::after{ /* highlight */
  content:"";position:absolute;top:12%;left:18%;width:34%;height:24%;border-radius:50%;
  background:radial-gradient(closest-side, rgba(255,255,255,.9), transparent);filter:blur(2px);
}
.orb-ring{
  position:absolute;border-radius:50%;border:1px solid rgba(56,225,255,.25);
  animation:pulseRing 3.4s ease-out infinite;
}
@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseRing{0%{transform:scale(.85);opacity:.6}100%{transform:scale(1.6);opacity:0}}
/* moods */
.orb.mood-happy{filter:saturate(1.15)}
.orb.mood-excited{animation:orbFloat 1.6s ease-in-out infinite, orbExcite 1.6s ease-in-out infinite}
@keyframes orbExcite{0%,100%{box-shadow:0 0 0 1px rgba(255,255,255,.18) inset,0 0 50px rgba(56,225,255,.7),0 0 120px rgba(79,140,255,.55),0 18px 50px rgba(0,0,0,.5)}50%{box-shadow:0 0 0 1px rgba(255,255,255,.3) inset,0 0 80px rgba(70,230,160,.8),0 0 160px rgba(56,225,255,.7),0 18px 50px rgba(0,0,0,.5)}}
.orb.mood-curious{background:radial-gradient(closest-side at 38% 32%, #fff 0%, #9be8ff 30%, #b59bff 75%, #6a5bd0 100%)}
.orb.mood-proud{background:radial-gradient(closest-side at 38% 32%, #fff6e0 0%, var(--amber) 32%, #ff8a3d 78%, #d65a1f 100%);box-shadow:0 0 0 1px rgba(255,255,255,.18) inset,0 0 50px rgba(255,194,75,.6),0 0 120px rgba(255,138,61,.45),0 18px 50px rgba(0,0,0,.5)}
.orb.mood-focus{background:radial-gradient(closest-side at 38% 32%, #eafff6 0%, var(--teal) 32%, #18a89a 78%, #0c6b62 100%)}
/* special Echo skin effects */
.orb.skin-nebula{box-shadow:0 0 0 1px rgba(255,255,255,.2) inset,0 0 52px rgba(150,120,255,.65),0 0 120px rgba(120,90,230,.5),0 18px 50px rgba(0,0,0,.5)}
.orb.skin-abyss{box-shadow:0 0 0 1px rgba(120,180,255,.28) inset,0 0 48px rgba(42,111,208,.65),0 0 120px rgba(10,26,58,.8),0 18px 50px rgba(0,0,0,.65)}
.orb.skin-glacier{box-shadow:0 0 0 1px rgba(255,255,255,.35) inset,0 0 50px rgba(122,214,255,.7),0 0 120px rgba(42,127,208,.5),0 18px 50px rgba(0,0,0,.5)}
.orb.skin-solar{animation:orbFloat 4s ease-in-out infinite, solarPulse 2.4s ease-in-out infinite}
@keyframes solarPulse{0%,100%{box-shadow:0 0 0 1px rgba(255,255,255,.2) inset,0 0 44px rgba(255,138,61,.6),0 0 100px rgba(255,90,40,.45),0 18px 50px rgba(0,0,0,.5)}50%{box-shadow:0 0 0 1px rgba(255,255,255,.34) inset,0 0 76px rgba(255,170,90,.9),0 0 150px rgba(255,120,60,.65),0 18px 50px rgba(0,0,0,.5)}}
.orb.skin-prism{animation:orbFloat 6s ease-in-out infinite, skinHue 7s linear infinite;box-shadow:0 0 0 1px rgba(255,255,255,.25) inset,0 0 54px rgba(120,200,255,.6),0 0 130px rgba(255,126,182,.45),0 18px 50px rgba(0,0,0,.5)}
@keyframes skinHue{to{filter:hue-rotate(360deg)}}
.orb.skin-eclipse{animation:orbFloat 6s ease-in-out infinite, spin 16s linear infinite;box-shadow:0 0 0 1px rgba(255,210,120,.4) inset,0 0 60px rgba(255,138,61,.55),0 0 140px rgba(255,90,40,.4),0 18px 50px rgba(0,0,0,.7)}
.orb.skin-singularity{animation:orbFloat 5s ease-in-out infinite, spin 9s linear infinite;box-shadow:0 0 0 1px rgba(120,160,255,.35) inset,0 0 56px rgba(56,225,255,.65),0 0 150px rgba(122,162,255,.55),0 18px 60px rgba(0,0,0,.8)}
.orb.skin-ascendant{animation:orbFloat 5s ease-in-out infinite, ascendGlow 2.6s ease-in-out infinite}
@keyframes ascendGlow{0%,100%{box-shadow:0 0 0 1px rgba(255,255,255,.28) inset,0 0 52px rgba(255,194,75,.7),0 0 120px rgba(255,138,61,.5),0 18px 50px rgba(0,0,0,.5)}50%{box-shadow:0 0 0 1px rgba(255,255,255,.45) inset,0 0 86px rgba(255,224,138,.98),0 0 180px rgba(255,160,80,.75),0 18px 50px rgba(0,0,0,.5)}}
/* generic designed-orb effects */
.orb.skin-spin{animation:orbFloat 6s ease-in-out infinite, spin 18s linear infinite}
.orb.skin-hue{animation:orbFloat 6s ease-in-out infinite, skinHue 9s linear infinite}
.orb.skin-pulse{animation:orbFloat 4.5s ease-in-out infinite, skinPulse 2.6s ease-in-out infinite}
@keyframes skinPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.28)}}
.orb.skin-limitless{animation:orbFloat 5s ease-in-out infinite, limitlessGlow 2.6s ease-in-out infinite}
/* Limitless: red core + 3 orbiting glowing energy shards */
.echo-aura{position:relative;display:inline-grid;place-items:center;overflow:visible}
.echo-aura>.orb{position:relative;z-index:2}
.echo-tomoe{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:132%;height:132%;z-index:3;overflow:visible;pointer-events:none;filter:drop-shadow(0 0 4px #ff7a8a) drop-shadow(0 0 9px #ff2a4a)}
.echo-tomoe .tomoe-rot{transform-origin:50% 50%;animation:tomoeSpin 3.4s linear infinite}
@keyframes tomoeSpin{to{transform:rotate(360deg)}}
@keyframes limitlessGlow{0%,100%{box-shadow:0 0 0 1px rgba(255,190,190,.45) inset,0 0 55px rgba(255,40,40,.8),0 0 130px rgba(180,0,30,.6),0 18px 60px rgba(0,0,0,.6)}50%{box-shadow:0 0 0 1px rgba(255,210,210,.6) inset,0 0 92px rgba(255,70,70,1),0 0 200px rgba(210,20,40,.82),0 18px 60px rgba(0,0,0,.6)}}

/* ============================================================
   APP SHELL
   ============================================================ */
#app{min-height:100vh;display:flex;flex-direction:column}

/* ---- Onboarding ---- */
.onboard{min-height:100vh;display:grid;place-items:center;padding:32px 18px}
.onboard-card{width:min(560px,100%);padding:40px}
.brand{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:6px}
.brand .mark{font-size:30px;font-weight:800;letter-spacing:-.5px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.steps-dots{display:flex;gap:8px;justify-content:center;margin:22px 0 10px}
.steps-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);transition:.3s}
.steps-dots span.on{width:26px;background:var(--grad)}
.center{text-align:center}
.h1{font-size:30px;font-weight:800;letter-spacing:-.6px;line-height:1.15}
.h2{font-size:22px;font-weight:800;letter-spacing:-.4px}
.sub{color:var(--txt-dim);font-size:15px;line-height:1.55;margin-top:8px}
.field{margin-top:18px}
.field>label{display:block;font-size:13px;font-weight:600;color:var(--txt-dim);margin-bottom:8px}

.avatar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:6px}
.avatar-opt{padding:14px 6px;border-radius:16px;border:1px solid var(--stroke);background:var(--panel);display:grid;place-items:center;gap:9px;transition:.2s}
.avatar-opt:hover{border-color:var(--stroke-2);transform:translateY(-2px)}
.avatar-opt.sel{border-color:rgba(56,225,255,.7);background:rgba(56,225,255,.08);box-shadow:0 0 0 3px rgba(56,225,255,.12)}
.avatar-opt .nm{font-size:12px;color:var(--txt-dim);font-weight:600}
.swatch{width:46px;height:46px;border-radius:50%;box-shadow:0 6px 18px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.15) inset}

.goal-suggest{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}
.goal-chip{padding:9px 14px;border-radius:999px;border:1px solid var(--stroke);background:var(--panel);font-size:13.5px;font-weight:600;color:var(--txt-dim);transition:.18s;display:flex;align-items:center;gap:7px}
.goal-chip:hover{border-color:var(--stroke-2);color:var(--txt)}
.goal-chip.sel{background:var(--grad);color:#04121f;border-color:transparent;font-weight:700}
.goal-list{margin-top:14px;display:flex;flex-direction:column;gap:9px}
.goal-row{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:13px;background:var(--panel);border:1px solid var(--stroke)}
.goal-row .gi{font-size:18px}
.goal-row .gt{flex:1;font-weight:600;font-size:14.5px}
.goal-row button{color:var(--txt-faint);font-size:18px;line-height:1;padding:2px 6px;border-radius:8px}
.goal-row button:hover{color:var(--pink);background:rgba(255,126,182,.1)}

/* ============================================================
   DASHBOARD
   ============================================================ */
.topbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;
  padding:14px 22px;border-bottom:1px solid var(--stroke);
  background:rgba(7,10,18,.6);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
}
.topbar .mark{font-size:21px;font-weight:800;letter-spacing:-.4px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.topbar .spacer{flex:1}
.lvl-chip{display:flex;align-items:center;gap:10px;padding:7px 9px 7px 7px;border-radius:999px;background:var(--panel-2);border:1px solid var(--stroke)}
.lvl-badge{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:14px;background:var(--grad);color:#04121f}
.lvl-chip .mini-bar{width:120px;height:7px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden}
.lvl-chip .mini-bar i{display:block;height:100%;background:var(--grad);border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.streak-chip{display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:999px;background:rgba(255,194,75,.1);border:1px solid rgba(255,194,75,.25);font-weight:700;color:var(--amber)}
.icon-btn{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--panel-2);border:1px solid var(--stroke);font-size:18px}
.icon-btn:hover{background:rgba(255,255,255,.1)}

.wrap{width:min(1180px,100%);margin:0 auto;padding:26px 22px 80px}
.grid{display:grid;grid-template-columns:340px 1fr;gap:22px;align-items:start}
@media(max-width:920px){.grid{grid-template-columns:1fr}}

/* tab navigation */
.tabs{display:flex;gap:7px;padding:6px;border-radius:16px;background:var(--panel);border:1px solid var(--stroke);overflow-x:auto}
.tab{flex:1;min-width:max-content;padding:11px 14px;border-radius:11px;font-weight:600;font-size:14px;color:var(--txt-dim);display:flex;align-items:center;justify-content:center;gap:7px;white-space:nowrap;transition:.18s}
.tab:hover{color:var(--txt);background:rgba(255,255,255,.04)}
.tab.on{background:var(--grad);color:#04121f;font-weight:700;box-shadow:0 6px 18px rgba(56,140,255,.3)}
.quest-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:600px){.quest-cols{grid-template-columns:1fr}}
#tabContent{animation:fadeIn .35s ease both}

.card{padding:22px}
.card h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px;margin-bottom:4px}
.card .hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card .hd .label{margin:0}

/* companion panel */
.companion-card{padding:26px 22px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;position:relative;overflow:hidden}
.companion-card .glow{position:absolute;inset:-40% -40% auto -40%;height:70%;background:radial-gradient(closest-side,rgba(56,225,255,.18),transparent);filter:blur(10px);pointer-events:none}
.comp-name{font-weight:800;font-size:18px;margin-top:14px;letter-spacing:-.3px}
.comp-status{font-size:13px;color:var(--txt-dim)}
.speech{
  margin-top:14px;width:100%;padding:14px 16px;border-radius:16px;border:1px solid var(--stroke);
  background:rgba(255,255,255,.04);font-size:14.5px;line-height:1.55;color:var(--txt);min-height:64px;
  animation:fadeUp .4s ease both;text-align:left;
}
.comp-actions{display:flex;gap:9px;margin-top:14px;width:100%}
.comp-actions .btn{flex:1;padding:11px}

/* XP / skills */
.xp-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:9px}
.xp-top .lv{font-size:26px;font-weight:800;letter-spacing:-.5px}
.xp-top .tx{font-size:13px;color:var(--txt-dim)}
.bar{height:12px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;position:relative}
.bar i{display:block;height:100%;background:var(--grad);border-radius:99px;transition:width .8s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 16px rgba(56,225,255,.5)}
.xp-sub{display:flex;justify-content:space-between;font-size:12px;color:var(--txt-faint);margin-top:7px}

.skills{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px}
.skill{padding:14px;border-radius:16px;background:var(--panel);border:1px solid var(--stroke)}
.skill .st{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px}
.skill .sv{font-size:12px;color:var(--txt-faint);margin-left:auto}
.skill .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:15px}
.skill .bar{height:8px;margin-top:10px}
.skill.knowledge .ic{background:rgba(79,140,255,.18);color:#9bc0ff}
.skill.knowledge .bar i{background:linear-gradient(90deg,#4f8cff,#9bc0ff)}
.skill.discipline .ic{background:rgba(56,225,255,.16);color:var(--cyan)}
.skill.discipline .bar i{background:linear-gradient(90deg,#38e1ff,#7af0ff)}
.skill.fitness .ic{background:rgba(70,230,160,.16);color:var(--green)}
.skill.fitness .bar i{background:linear-gradient(90deg,#46e6a0,#9bffd1)}
.skill.creativity .ic{background:rgba(255,126,182,.16);color:var(--pink)}
.skill.creativity .bar i{background:linear-gradient(90deg,#ff7eb6,#ffb3d6)}

/* quests */
.quest{display:flex;align-items:center;gap:13px;padding:13px 4px;border-bottom:1px solid rgba(255,255,255,.05)}
.quest:last-child{border-bottom:none}
.q-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--stroke-2);display:grid;place-items:center;flex-shrink:0;transition:.25s;font-size:14px}
.quest.done .q-check{background:var(--green);border-color:var(--green);color:#04201a}
.q-body{flex:1;min-width:0}
.q-title{font-weight:600;font-size:14px}
.quest.done .q-title{color:var(--txt-dim);text-decoration:line-through}
.q-prog{font-size:12px;color:var(--txt-faint);margin-top:3px}
.q-prog .qbar{display:inline-block;width:80px;height:5px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden;vertical-align:middle;margin-right:7px}
.q-prog .qbar i{display:block;height:100%;background:var(--grad)}
.q-reward{font-size:12px;font-weight:700;color:var(--amber);flex-shrink:0;display:flex;align-items:center;gap:4px}

/* goals */
.goalcard{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;background:var(--panel);border:1px solid var(--stroke);transition:.2s}
.goalcard+.goalcard{margin-top:10px}
.goalcard .gic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:19px;background:var(--panel-2);border:1px solid var(--stroke)}
.goalcard .gt{font-weight:600;font-size:14.5px}
.goalcard .gmeta{font-size:12px;color:var(--txt-faint);margin-top:2px}

/* activity */
.act{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.act:last-child{border-bottom:none}
.act .ai{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;background:var(--panel-2);font-size:15px;flex-shrink:0}
.act .at{font-size:13.5px;font-weight:600}
.act .ad{font-size:11.5px;color:var(--txt-faint);margin-top:1px}
.act .ax{margin-left:auto;font-size:12px;font-weight:700;color:var(--amber)}
.empty{color:var(--txt-faint);font-size:13.5px;text-align:center;padding:18px 0}

.section-title{font-size:13px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--txt-faint);margin:30px 2px 14px}

/* quick start tiles */
.starts{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:620px){.starts{grid-template-columns:1fr 1fr}}
.start-tile{padding:18px;border-radius:18px;background:var(--panel);border:1px solid var(--stroke);text-align:left;transition:.2s;position:relative;overflow:hidden}
.start-tile:hover{transform:translateY(-3px);border-color:var(--stroke-2);background:var(--panel-2)}
.start-tile .em{font-size:24px}
.start-tile .nm{font-weight:700;font-size:15px;margin-top:10px}
.start-tile .ds{font-size:12px;color:var(--txt-faint);margin-top:3px}

/* ============================================================
   FOCUS SESSION OVERLAY
   ============================================================ */
.overlay{position:fixed;inset:0;z-index:100;display:none;place-items:center;padding:24px;
  background:rgba(4,6,12,.75);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);animation:fadeIn .3s ease}
.overlay.show{display:grid}
.modal{width:min(720px,100%);max-height:92vh;overflow:auto;padding:30px;position:relative}
.modal .close{position:absolute;top:18px;right:18px}

.setup-types{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:8px}
@media(max-width:560px){.setup-types{grid-template-columns:1fr 1fr}}
.type-opt{padding:16px 10px;border-radius:15px;border:1px solid var(--stroke);background:var(--panel);text-align:center;transition:.2s}
.type-opt:hover{border-color:var(--stroke-2)}
.type-opt.sel{border-color:rgba(56,225,255,.7);background:rgba(56,225,255,.08)}
.type-opt .em{font-size:22px}
.type-opt .nm{font-size:13px;font-weight:600;margin-top:7px}
.dur-row{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.dur-opt{flex:1;min-width:70px;padding:14px;border-radius:14px;border:1px solid var(--stroke);background:var(--panel);text-align:center;font-weight:700;transition:.2s}
.dur-opt.sel{border-color:rgba(56,225,255,.7);background:rgba(56,225,255,.08);color:var(--cyan)}
.dur-opt:hover{border-color:var(--stroke-2)}

/* running timer */
.timer-stage{display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px}
.ring-wrap{position:relative;width:260px;height:260px;margin:6px 0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:10}
.ring-fg{fill:none;stroke:url(#g1);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s linear;filter:drop-shadow(0 0 8px rgba(56,225,255,.6))}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-center .time{font-size:52px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.ring-center .ph{font-size:13px;color:var(--txt-dim);margin-top:2px}
.focus-task{font-size:18px;font-weight:700;margin-top:4px}
.coach-bubble{margin-top:8px;max-width:440px;padding:13px 17px;border-radius:16px;background:rgba(56,225,255,.07);border:1px solid rgba(56,225,255,.2);font-size:14.5px;line-height:1.5;animation:fadeUp .4s ease}
.timer-controls{display:flex;gap:11px;margin-top:18px}

/* ============================================================
   CHAT (companion + goal coach)
   ============================================================ */
.chat-modal{width:min(640px,100%);height:min(80vh,720px);display:flex;flex-direction:column;padding:0;overflow:hidden}
.chat-head{display:flex;align-items:center;gap:13px;padding:18px 20px;border-bottom:1px solid var(--stroke)}
.chat-head .nm{font-weight:800;font-size:16px}
.chat-head .st{font-size:12px;color:var(--green)}
.chat-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:13px}
.msg{max-width:82%;padding:12px 15px;border-radius:16px;font-size:14.5px;line-height:1.55;animation:fadeUp .35s ease both}
.msg.bot{align-self:flex-start;background:var(--panel-2);border:1px solid var(--stroke);border-bottom-left-radius:5px}
.msg.me{align-self:flex-end;background:var(--grad);color:#06121f;font-weight:500;border-bottom-right-radius:5px}
.typing{align-self:flex-start;display:flex;gap:5px;padding:14px 16px;background:var(--panel-2);border:1px solid var(--stroke);border-radius:16px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--txt-dim);animation:blink 1.3s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.chat-suggest{display:flex;gap:8px;padding:0 20px 12px;flex-wrap:wrap}
.chat-suggest button{font-size:12.5px;padding:8px 12px;border-radius:999px;background:var(--panel);border:1px solid var(--stroke);color:var(--txt-dim)}
.chat-suggest button:hover{color:var(--txt);border-color:var(--stroke-2)}
.chat-input{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--stroke)}
.chat-input input{flex:1}
.chat-input .send{width:48px;height:48px;border-radius:13px;flex-shrink:0;background:var(--grad);color:#04121f;display:grid;place-items:center;font-size:18px}

/* ============================================================
   TOASTS + LEVEL UP
   ============================================================ */
.toasts{position:fixed;top:74px;right:18px;z-index:120;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.toast{display:flex;align-items:center;gap:11px;padding:13px 17px;border-radius:14px;background:rgba(15,22,40,.92);border:1px solid var(--stroke-2);box-shadow:var(--shadow);animation:toastIn .4s cubic-bezier(.2,.8,.2,1) both;max-width:330px}
.toast .ti{font-size:20px}
.toast .tt{font-size:14px;font-weight:600}
.toast .td{font-size:12px;color:var(--txt-dim)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

.levelup{position:fixed;inset:0;z-index:130;display:none;place-items:center;background:rgba(4,6,12,.8);backdrop-filter:blur(10px);animation:fadeIn .35s ease}
.levelup.show{display:grid}
.levelup .lu-card{text-align:center;padding:46px 40px;animation:pop .6s cubic-bezier(.2,.9,.2,1) both}
.levelup .big{font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--amber);font-weight:700}
.levelup .num{font-size:84px;font-weight:900;line-height:1;background:var(--grad-amber);-webkit-background-clip:text;background-clip:text;color:transparent;margin:8px 0;letter-spacing:-2px}
.confetti{position:fixed;width:10px;height:14px;top:-20px;z-index:131;border-radius:2px;pointer-events:none}

/* settings */
.set-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.set-row:last-child{border-bottom:none}
.set-row .sd{font-size:12.5px;color:var(--txt-faint);margin-top:3px}
.danger{color:var(--pink)}

/* ---------- tasks ---------- */
.task-row{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:13px;background:var(--panel);border:1px solid var(--stroke);transition:.2s}
.task-row+.task-row{margin-top:9px}
.task-row.done{opacity:.65}
.t-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--stroke-2);display:grid;place-items:center;flex-shrink:0;font-size:14px;transition:.2s;background:transparent;color:var(--txt)}
.t-check:not(:disabled):hover{border-color:var(--green);box-shadow:0 0 0 3px rgba(70,230,160,.12)}
.task-row.done .t-check{background:var(--green);border-color:var(--green);color:#04201a}
.t-title{flex:1;font-weight:600;font-size:14.5px;min-width:0;overflow-wrap:anywhere}
.task-row.done .t-title{text-decoration:line-through;color:var(--txt-dim)}
.t-xp{font-size:12px;font-weight:700;color:var(--amber);flex-shrink:0}
.t-streak{font-size:12px;font-weight:700;color:#ff9b5d;flex-shrink:0;background:rgba(255,138,61,.12);border:1px solid rgba(255,138,61,.25);padding:3px 9px;border-radius:999px}
.t-del{color:var(--txt-faint);font-size:16px;line-height:1;padding:3px 7px;border-radius:8px;flex-shrink:0}
.t-del:hover{color:var(--pink);background:rgba(255,126,182,.1)}

/* rank pill (Stats + system flavor) */
.rank-pill{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#9fe6ff;border:1px solid rgba(56,225,255,.32);padding:4px 9px;border-radius:8px;vertical-align:middle;margin-left:10px;text-shadow:0 0 10px rgba(56,225,255,.5)}

/* ============================================================
   DASHBOARD HERO — System Interface
   ============================================================ */
.hero{position:relative;overflow:hidden;border-bottom:1px solid var(--stroke);
  background:
    radial-gradient(900px 380px at 18% -20%, rgba(79,140,255,.14), transparent 60%),
    radial-gradient(760px 360px at 88% -10%, rgba(56,225,255,.12), transparent 60%),
    linear-gradient(180deg,#070b16,#070a12)}
.hero-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:.8}
.hero-grid{position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    linear-gradient(rgba(56,225,255,.04) 1px,transparent 1px) 0 0/100% 46px,
    linear-gradient(90deg, rgba(56,225,255,.03) 1px, transparent 1px) 0 0/46px 100%;
  -webkit-mask-image:linear-gradient(180deg,#000,transparent 85%);mask-image:linear-gradient(180deg,#000,transparent 85%);
  animation:heroGridDrift 20s linear infinite}
@keyframes heroGridDrift{from{background-position:0 0,0 0}to{background-position:0 46px,46px 0}}
.hero-veil{position:absolute;inset:0;z-index:0;pointer-events:none;background:radial-gradient(120% 90% at 50% -10%, transparent 50%, rgba(7,10,18,.55))}
.hero-inner{position:relative;z-index:2;padding-top:24px;padding-bottom:26px}

.sys-status{display:inline-flex;align-items:center;gap:12px;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  font-size:clamp(19px,4.2vw,40px);font-weight:800;letter-spacing:.13em;color:#cfeeff;text-shadow:0 0 26px rgba(56,225,255,.5);margin-bottom:20px}
.sys-status b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.ss-dot{width:11px;height:11px;border-radius:50%;background:var(--green);box-shadow:0 0 14px var(--green),0 0 30px var(--green);animation:ssPulse 2s ease-in-out infinite}
@keyframes ssPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

.hero-row{display:grid;grid-template-columns:1fr 280px;gap:26px;align-items:start}
@media(max-width:820px){.hero-row{grid-template-columns:1fr}}
.hero-name{font-size:clamp(26px,5vw,40px);font-weight:800;letter-spacing:-.5px;line-height:1.05}
.hero-lvls{display:flex;gap:11px;flex-wrap:wrap;margin-top:11px;font-family:ui-monospace,monospace}
.hl-level{font-size:13.5px;font-weight:800;letter-spacing:.16em;color:#9fe6ff;border:1px solid rgba(56,225,255,.3);padding:6px 12px;border-radius:9px;text-shadow:0 0 12px rgba(56,225,255,.5)}
.hl-rank{font-size:13.5px;font-weight:700;letter-spacing:.16em;color:#cbd9ee;border:1px solid var(--stroke);padding:6px 12px;border-radius:9px}
.hl-rank.rank-S{font-weight:800}
.hl-rank.rank-National{font-weight:800;animation:nationalPulse 2.3s ease-in-out infinite;background:linear-gradient(180deg, rgba(255,93,126,.12), transparent)}
@keyframes nationalPulse{0%,100%{box-shadow:0 0 16px rgba(255,93,126,.35)}50%{box-shadow:0 0 30px rgba(255,93,126,.75)}}
.pi-next{font-size:12.5px;color:var(--txt-faint);margin-top:12px}
.pi-next b{font-weight:700}
.hero-xpbar{height:14px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:16px;border:1px solid var(--stroke)}
.hero-xpbar i{display:block;height:100%;background:var(--grad);border-radius:99px;box-shadow:0 0 18px rgba(56,225,255,.6);transition:width .9s cubic-bezier(.2,.8,.2,1)}
.hero-xpsub{display:flex;justify-content:space-between;font-size:12.5px;color:var(--txt-dim);margin-top:8px;font-family:ui-monospace,monospace;letter-spacing:.04em}
.hl-streak{color:var(--amber);font-weight:700}
.hero-msg{margin-top:16px;font-size:15px;color:#acd0f5;font-style:italic;letter-spacing:.02em;opacity:1;transition:opacity .5s ease;min-height:22px}

.active-quest{margin-top:18px;padding:16px 18px;border-radius:16px;border:1px solid rgba(56,225,255,.22);
  background:linear-gradient(180deg, rgba(56,225,255,.06), rgba(56,140,255,.03));box-shadow:inset 0 0 30px rgba(56,225,255,.05), 0 0 26px rgba(56,140,255,.12)}
.aq-head{display:flex;justify-content:space-between;align-items:center}
.aq-k{font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.26em;color:#6fcdf0;text-shadow:0 0 12px rgba(56,225,255,.5)}
.aq-pct{font-family:ui-monospace,monospace;font-weight:800;color:#9fe6ff}
.aq-name{font-size:18px;font-weight:700;margin:8px 0 10px;letter-spacing:-.2px}
.aq-bar{height:9px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
.aq-bar i{display:block;height:100%;background:var(--grad);border-radius:99px;box-shadow:0 0 14px rgba(56,225,255,.6);transition:width .9s cubic-bezier(.2,.8,.2,1)}
.aq-foot{display:flex;justify-content:space-between;margin-top:9px;font-family:ui-monospace,monospace;font-size:11.5px;letter-spacing:.14em}
.aq-kind{color:#7fa6cc}.aq-reward{color:var(--amber);font-weight:700}

.hero-companion{display:flex;flex-direction:column;align-items:center;text-align:center;gap:5px;padding:18px 16px;border-radius:18px;border:1px solid var(--stroke);background:var(--panel);backdrop-filter:blur(14px)}
.hero-companion .speech{min-height:auto}
.hero-companion .comp-actions{margin-top:12px}

/* ============================================================
   SYSTEM PANELS + Overview content
   ============================================================ */
.sys-panel{position:relative;overflow:hidden;border:1px solid var(--stroke);
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.022));
  box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 18px 50px rgba(0,0,0,.35);
  transition:transform .25s ease, box-shadow .3s ease, border-color .3s ease}
.sys-panel:hover{transform:translateY(-2px);border-color:rgba(56,225,255,.28);box-shadow:0 1px 0 rgba(255,255,255,.06) inset, 0 22px 60px rgba(0,0,0,.45), 0 0 38px rgba(56,140,255,.13)}
.sys-panel::before{content:"";position:absolute;left:0;top:20px;bottom:20px;width:3px;border-radius:0 3px 3px 0;background:var(--grad);opacity:.55;box-shadow:0 0 14px rgba(56,225,255,.5)}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:780px){.ov-grid{grid-template-columns:1fr}}

.attrs{display:grid;grid-template-columns:1fr 1fr;gap:15px}
@media(max-width:520px){.attrs{grid-template-columns:1fr}}
.attr-top{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600}
.attr-ic{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:14px}
.attr-nm{flex:1}
.attr-lv{font-size:11px;color:var(--txt-faint);font-family:ui-monospace,monospace;letter-spacing:.08em}
.attr-bar{height:8px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:9px}
.attr-bar i{display:block;height:100%;border-radius:99px;transition:width .9s cubic-bezier(.2,.8,.2,1)}

.missions{display:flex;flex-direction:column;gap:10px}
.mission{display:flex;align-items:center;gap:13px;padding:13px;border-radius:14px;border:1px solid var(--stroke);background:var(--panel);transition:.2s}
.mission:hover{border-color:rgba(56,225,255,.25)}
.mission.done{opacity:.7}
.mission-glyph{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:15px;color:#9fe6ff;background:rgba(56,225,255,.1);border:1px solid rgba(56,225,255,.22);flex-shrink:0}
.mission.done .mission-glyph{color:#04201a;background:var(--green);border-color:var(--green)}
.mission-body{flex:1;min-width:0}
.mission-nm{font-weight:600;font-size:14px}
.mission.done .mission-nm{text-decoration:line-through;color:var(--txt-dim)}
.mission-bar{height:6px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:7px}
.mission-bar i{display:block;height:100%;background:var(--grad);border-radius:99px;transition:width .8s ease}
.mission-sub{font-size:11.5px;color:var(--txt-faint);margin-top:5px;font-family:ui-monospace,monospace}
.mission-reward{font-weight:700;color:var(--amber);font-size:13px;flex-shrink:0}

.bosses{display:flex;flex-direction:column;gap:12px}
.boss{display:flex;align-items:center;gap:14px;padding:14px;border-radius:15px;border:1px solid rgba(255,126,182,.18);background:linear-gradient(180deg, rgba(255,126,182,.05), rgba(255,126,182,.01))}
.boss.defeated{opacity:.55;border-color:var(--stroke);background:var(--panel)}
.boss-ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:22px;background:rgba(0,0,0,.25);border:1px solid var(--stroke);flex-shrink:0}
.boss-body{flex:1;min-width:0}
.boss-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.boss-nm{font-weight:700;font-size:15px;overflow-wrap:anywhere}
.boss-reward{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.14em;color:var(--amber);flex-shrink:0}
.boss.defeated .boss-reward{color:var(--txt-faint)}
.boss-hp{height:10px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin:9px 0 6px;border:1px solid rgba(255,255,255,.06)}
.boss-hp i{display:block;height:100%;background:linear-gradient(90deg,#ff5d7e,#ff9bd0);border-radius:99px;box-shadow:0 0 12px rgba(255,93,126,.6);transition:width .9s cubic-bezier(.2,.8,.2,1)}
.boss.defeated .boss-hp i{background:var(--stroke);box-shadow:none}
.boss-sub{display:flex;justify-content:space-between;font-size:11.5px;color:var(--txt-faint);font-family:ui-monospace,monospace}
.boss-del{align-self:flex-start;color:var(--txt-faint);font-size:15px;padding:3px 7px;border-radius:8px;flex-shrink:0}
.boss-del:hover{color:var(--pink);background:rgba(255,126,182,.1)}

/* ---------- dungeons (milestone-driven) ---------- */
.dg-toolbar{display:flex;justify-content:flex-end;margin-bottom:16px}
.dungeons{display:flex;flex-direction:column;gap:18px}
.dungeon{padding:18px}
.dungeon.cleared{opacity:.72}
.dg-head{display:flex;align-items:center;gap:14px}
.dg-ic{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;font-size:24px;background:rgba(255,126,182,.1);border:1px solid rgba(255,126,182,.22);flex-shrink:0}
.dungeon.cleared .dg-ic{background:rgba(0,0,0,.25);border-color:var(--stroke)}
.dg-info{flex:1;min-width:0}
.dg-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.dg-nm{font-weight:700;font-size:16px;overflow-wrap:anywhere}
.dg-reward{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.14em;color:var(--amber);flex-shrink:0}
.dungeon.cleared .dg-reward{color:var(--green)}
.dg-hp{height:11px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin:10px 0 6px;border:1px solid rgba(255,255,255,.06)}
.dg-hp i{display:block;height:100%;background:linear-gradient(90deg,#ff5d7e,#ffb05d);border-radius:99px;box-shadow:0 0 12px rgba(255,93,126,.55);transition:width .8s cubic-bezier(.2,.8,.2,1)}
.dungeon.cleared .dg-hp i{background:linear-gradient(90deg,#46e6a0,#9bffd1);box-shadow:0 0 12px rgba(70,230,160,.5)}
.dg-sub-line{display:flex;justify-content:space-between;font-size:11.5px;color:var(--txt-faint);font-family:ui-monospace,monospace}
.dg-del{align-self:flex-start;color:var(--txt-faint);font-size:15px;padding:3px 7px;border-radius:8px;flex-shrink:0}
.dg-del:hover{color:var(--pink);background:rgba(255,126,182,.1)}
.dg-subs{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;gap:8px}
.dg-sub{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;background:var(--panel);border:1px solid var(--stroke)}
.dg-sub.done{opacity:.62}
.dg-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--stroke-2);display:grid;place-items:center;flex-shrink:0;font-size:13px;color:var(--txt);transition:.2s;background:transparent}
.dg-check:not(:disabled):hover{border-color:var(--green);box-shadow:0 0 0 3px rgba(70,230,160,.12)}
.dg-sub.done .dg-check{background:var(--green);border-color:var(--green);color:#04201a}
.dg-sub-t{flex:1;font-size:14px;font-weight:500;overflow-wrap:anywhere}
.dg-sub.done .dg-sub-t{text-decoration:line-through;color:var(--txt-dim)}
.dg-sub-xp{font-size:11.5px;font-weight:700;color:var(--amber);flex-shrink:0}
.dg-sub-del{color:var(--txt-faint);font-size:14px;padding:2px 6px;border-radius:7px;flex-shrink:0}
.dg-sub-del:hover{color:var(--pink);background:rgba(255,126,182,.1)}
.dg-addsub{display:flex;gap:9px;margin-top:2px}
.dg-subinput{flex:1}
.dg-addbtn{flex-shrink:0}

/* create-dungeon modal bits */
.dg-iconpick{display:flex;flex-wrap:wrap;gap:8px}
.dg-iconopt{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:20px;border:1px solid var(--stroke);background:var(--panel);transition:.18s}
.dg-iconopt:hover{border-color:var(--stroke-2)}
.dg-iconopt.sel{border-color:rgba(56,225,255,.7);background:rgba(56,225,255,.1);box-shadow:0 0 0 3px rgba(56,225,255,.12)}
.dg-draftlist{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.dg-draftrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;background:var(--panel);border:1px solid var(--stroke)}
.dg-draftbullet{color:#9fe6ff}
.dg-drafttxt{flex:1;font-size:14px;overflow-wrap:anywhere}
.dg-draftdel{color:var(--txt-faint);font-size:14px;padding:2px 6px;border-radius:7px}
.dg-draftdel:hover{color:var(--pink);background:rgba(255,126,182,.1)}

.achs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:720px){.achs{grid-template-columns:1fr 1fr}}
@media(max-width:460px){.achs{grid-template-columns:1fr}}
.ach{display:flex;align-items:center;gap:11px;padding:12px;border-radius:14px;border:1px solid var(--stroke);background:var(--panel);transition:.2s}
.ach.on{border-color:rgba(56,225,255,.3);box-shadow:0 0 22px rgba(56,140,255,.12)}
.ach.on:hover{transform:translateY(-2px)}
.ach.off{opacity:.45;filter:grayscale(.6)}
.ach-ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:18px;background:rgba(0,0,0,.25);border:1px solid var(--stroke);flex-shrink:0}
.ach.on .ach-ic{background:rgba(56,225,255,.12);border-color:rgba(56,225,255,.3)}
.ach-nm{font-weight:700;font-size:13.5px}
.ach-desc{font-size:11px;color:var(--txt-faint);margin-top:2px;overflow-wrap:anywhere}

/* ============================================================
   TITLES
   ============================================================ */
.title-showcase{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px}
.title-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;letter-spacing:.04em;
  padding:5px 11px;border-radius:999px;color:var(--rc);border:1px solid color-mix(in srgb, var(--rc) 45%, transparent);
  background:color-mix(in srgb, var(--rc) 12%, transparent);box-shadow:0 0 14px color-mix(in srgb, var(--rc) 28%, transparent)}

.equip-bar{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:560px){.equip-bar{grid-template-columns:1fr}}
.equip-slot{padding:14px 16px;border-radius:14px;border:1px dashed var(--stroke-2);background:rgba(255,255,255,.02)}
.es-label{font-family:ui-monospace,monospace;font-size:10.5px;letter-spacing:.24em;color:#6fa8cf;margin-bottom:10px}
.es-empty{color:var(--txt-faint);font-size:13.5px}
.es-filled{display:flex;align-items:center;gap:10px}
.es-clear{color:var(--txt-faint);font-size:14px;padding:3px 7px;border-radius:8px}
.es-clear:hover{color:var(--pink);background:rgba(255,126,182,.1)}

.title-controls{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0 18px;align-items:center}
.title-controls #titleSearch{flex:1;min-width:180px}
.title-controls select{background:rgba(0,0,0,.25);border:1px solid var(--stroke);color:var(--txt);border-radius:11px;padding:11px 13px;font-size:14px;outline:none}
.title-controls .btn{padding:11px 15px}

.titles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.title-card{position:relative;padding:16px;border-radius:16px;border:1px solid color-mix(in srgb, var(--rc) 35%, var(--stroke));
  background:linear-gradient(180deg, color-mix(in srgb, var(--rc) 7%, transparent), rgba(255,255,255,.02));
  transition:transform .2s ease, box-shadow .3s ease;overflow:hidden}
.title-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rc);box-shadow:0 0 12px var(--rc)}
.title-card.unlocked:hover{transform:translateY(-3px);box-shadow:0 16px 44px rgba(0,0,0,.4), 0 0 28px color-mix(in srgb, var(--rc) 30%, transparent)}
.title-card.locked{opacity:.6;filter:saturate(.7)}
.title-card.rar-Mythic{animation:mythicPulse 2.6s ease-in-out infinite}
.title-card.rar-Mythic::before{background:linear-gradient(180deg,#ff5d7e,#ffd27a)}
@keyframes mythicPulse{0%,100%{box-shadow:0 0 18px rgba(255,93,126,.25)}50%{box-shadow:0 0 34px rgba(255,93,126,.55)}}
.tc-rar{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--rc)}
.tc-name{font-size:16px;font-weight:800;margin:6px 0 3px;letter-spacing:-.2px;overflow-wrap:anywhere}
.tc-cat{font-size:11px;color:var(--txt-faint);letter-spacing:.08em}
.tc-desc{font-size:12.5px;color:var(--txt-dim);margin-top:9px;line-height:1.5;min-height:34px}
.tc-req{font-family:ui-monospace,monospace;font-size:11px;color:#7fa6cc;margin-top:8px}
.tc-fx{font-size:11.5px;color:#ffd27a;margin-top:8px;font-weight:600}

/* companion skins */
.skins-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.skin-card{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;gap:7px;padding:18px 12px;border-radius:16px;
  border:1px solid color-mix(in srgb, var(--rc) 35%, var(--stroke));background:linear-gradient(180deg, color-mix(in srgb, var(--rc) 7%, transparent), rgba(255,255,255,.02));transition:transform .2s ease}
.skin-card:not(.locked):hover{transform:translateY(-3px)}
.skin-card.equipped{border-color:var(--rc);box-shadow:0 0 26px color-mix(in srgb, var(--rc) 32%, transparent)}
.skin-card.rar-Mythic{animation:mythicPulse 2.6s ease-in-out infinite}
.skin-orb-wrap{height:64px;display:grid;place-items:center}
.skin-nm{font-weight:800;font-size:14px;letter-spacing:-.2px}
.skin-rar{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--rc)}
.skin-eq{padding:7px 14px;font-size:12.5px;margin-top:2px}
.skin-eq.on{background:var(--grad);color:#04121f;border-color:transparent;font-weight:700}
.skin-req{font-family:ui-monospace,monospace;font-size:10.5px;color:#7fa6cc;margin-top:2px;line-height:1.4}
.skin-card.rar-Divine{border-color:#a9c7ff;box-shadow:0 0 26px rgba(140,170,255,.35);animation:mythicPulse 2.4s ease-in-out infinite}
/* character-style companion buddies */
.buddy{position:relative;border-radius:50%;overflow:hidden;background:#0c1322;
  box-shadow:0 0 0 1px rgba(255,255,255,.12) inset, 0 0 32px rgba(56,140,255,.32), 0 14px 40px rgba(0,0,0,.5);
  animation:orbFloat 6s ease-in-out infinite}
.buddy svg{display:block;width:100%;height:100%}
.buddy.mood-excited{animation:orbFloat 1.6s ease-in-out infinite}
.skin-equipped{display:flex;align-items:center;gap:20px;flex-wrap:wrap;border-color:color-mix(in srgb, var(--rc) 35%, var(--stroke))}
.se-label{font-family:ui-monospace,monospace;font-size:10.5px;letter-spacing:.24em;color:#6fa8cf}
.se-name{font-size:22px;font-weight:800;margin-top:4px}
.se-rar{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;margin-top:3px}
.se-count{margin-left:auto;font-family:ui-monospace,monospace;font-size:12px;color:var(--txt-faint)}
.fx-banner{margin-top:14px;padding:11px 15px;border-radius:12px;font-size:13px;background:rgba(255,194,75,.08);border:1px solid rgba(255,194,75,.25);color:#ffd27a}
.fx-banner.muted{background:rgba(255,255,255,.03);border-color:var(--stroke);color:var(--txt-faint)}
.fx-banner b{color:#ffe0a0}
.hl-xpfx{font-size:12px;font-weight:800;letter-spacing:.05em;color:#ffd27a;font-family:ui-monospace,monospace}
.tc-actions{display:flex;gap:7px;margin-top:12px}
.tc-eq{flex:1;padding:8px 6px;font-size:12px}
.tc-eq.on{background:var(--grad);color:#04121f;border-color:transparent;font-weight:700}
.tc-fav{position:absolute;top:12px;right:12px;font-size:16px;color:var(--txt-faint);background:transparent;line-height:1;transition:.18s;z-index:2}
.tc-fav:hover{color:var(--amber)}
.tc-fav.on{color:var(--amber);text-shadow:0 0 12px rgba(255,194,75,.6)}

/* ============================================================
   TOP NAVIGATION
   ============================================================ */
.topbar{gap:10px}
.nav{display:flex;align-items:center;gap:4px;margin-left:8px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-item{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:11px;font-size:14px;font-weight:600;color:var(--txt-dim);white-space:nowrap;position:relative;transition:.18s ease;border:1px solid transparent}
.nav-item:hover{color:var(--txt);background:rgba(255,255,255,.05)}
.nav-item .ni-em{font-size:15px;opacity:.92}
.nav-item.on{color:#cfeeff;background:rgba(56,225,255,.1);border-color:rgba(56,225,255,.28);box-shadow:0 0 18px rgba(56,140,255,.2), inset 0 0 16px rgba(56,225,255,.06)}
.nav-item.on::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:2px;border-radius:2px;background:var(--grad);box-shadow:0 0 10px rgba(56,225,255,.7)}
@media(max-width:860px){ .nav-item .ni-nm{display:none} .nav-item{padding:9px 11px} .nav-item .ni-em{font-size:18px} .lvl-chip .mini-bar{width:70px} }

/* ============================================================
   HERO META + DASHBOARD BODY
   ============================================================ */
.hero-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:22px}
@media(max-width:560px){.hero-meta{grid-template-columns:1fr}}
.hm{padding:15px 17px;border-radius:14px;border:1px solid var(--stroke);background:rgba(255,255,255,.035)}
.hm-k{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:10.5px;letter-spacing:.22em;color:#6fa8cf}
.hm-v{font-size:16px;font-weight:700;margin-top:7px;letter-spacing:-.2px;overflow-wrap:anywhere}
.hm-v.amber{color:var(--amber)}
.grade{display:inline-grid;place-items:center;width:26px;height:26px;border-radius:8px;font-weight:900;font-size:14px;margin-right:8px;vertical-align:middle}
.grade-S{background:linear-gradient(135deg,#ffd27a,#ffab3d);color:#3a2400}
.grade-A{background:rgba(70,230,160,.2);color:#7df0b6;border:1px solid rgba(70,230,160,.4)}
.grade-B{background:rgba(56,225,255,.18);color:#9fe6ff;border:1px solid rgba(56,225,255,.35)}
.grade-C{background:rgba(255,194,75,.16);color:#ffd27a;border:1px solid rgba(255,194,75,.3)}
.grade-D{background:rgba(255,255,255,.08);color:var(--txt-dim);border:1px solid var(--stroke)}

.dash-body{padding-top:32px;padding-bottom:84px}
.section-h{font-size:13px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--txt-faint);margin:0 2px 16px}
.dash-body .section-h:not(:first-child){margin-top:38px}

.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:900px){.quick-actions{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.quick-actions{grid-template-columns:1fr}}
.qa-card{position:relative;overflow:hidden;text-align:left;padding:22px;border-radius:18px;border:1px solid var(--stroke);
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));transition:transform .2s ease, border-color .25s, box-shadow .3s}
.qa-card:hover{transform:translateY(-3px);border-color:rgba(56,225,255,.3);box-shadow:0 18px 50px rgba(0,0,0,.4), 0 0 34px rgba(56,140,255,.16)}
.qa-ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:22px;background:rgba(56,225,255,.1);border:1px solid rgba(56,225,255,.22);color:#9fe6ff}
.qa-nm{font-size:16px;font-weight:700;margin-top:14px}
.qa-sub{font-size:12.5px;color:var(--txt-faint);margin-top:4px}
.qa-card::after{content:"→";position:absolute;top:20px;right:20px;color:var(--txt-faint);font-size:18px;transition:.2s}
.qa-card:hover::after{color:#9fe6ff;transform:translateX(3px)}

/* non-dashboard page headers */
.page-body{padding-top:32px;padding-bottom:84px}
.page-head{margin-bottom:26px}
.page-title{font-size:clamp(24px,4vw,34px);font-weight:800;letter-spacing:-.5px}
.page-sub{color:var(--txt-dim);font-size:14.5px;margin-top:9px;max-width:660px;line-height:1.6}

/* profile */
.profile-id{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.profile-id .orb{flex-shrink:0}
.pi-name{font-size:24px;font-weight:800;letter-spacing:-.4px}
.pi-user{color:var(--txt-faint);font-size:13.5px;font-family:ui-monospace,monospace;margin-top:3px}
.pi-chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:13px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:22px}
@media(max-width:560px){.stat-row{grid-template-columns:1fr 1fr}}
.stat-box{padding:16px;border-radius:14px;border:1px solid var(--stroke);background:rgba(255,255,255,.03);text-align:center}
.stat-num{font-size:23px;font-weight:800;letter-spacing:-.5px}
.stat-lbl{font-size:10.5px;color:var(--txt-faint);letter-spacing:.12em;text-transform:uppercase;margin-top:5px}

/* ============================================================
   GUIDED TOUR
   ============================================================ */
#tour{position:fixed;inset:0;z-index:160;pointer-events:none}
.tour-block{position:fixed;inset:0;pointer-events:auto;background:transparent}
.tour-spot{position:fixed;top:0;left:0;width:0;height:0;border-radius:16px;pointer-events:none;opacity:0;
  box-shadow:0 0 0 9999px rgba(4,7,14,.74), 0 0 0 2px rgba(56,225,255,.75), 0 0 34px rgba(56,225,255,.45) inset;
  transition:top .35s cubic-bezier(.2,.8,.2,1), left .35s cubic-bezier(.2,.8,.2,1), width .35s cubic-bezier(.2,.8,.2,1), height .35s cubic-bezier(.2,.8,.2,1), opacity .3s ease}
.tour-card{position:fixed;top:50%;left:50%;pointer-events:auto;width:min(360px,92vw);padding:18px 20px;
  border:1px solid rgba(56,225,255,.32);box-shadow:0 20px 60px rgba(0,0,0,.55), 0 0 40px rgba(56,140,255,.18);
  transition:top .35s ease, left .35s ease}
.tour-spk{display:flex;align-items:center;gap:9px;font-size:12px;color:#7fb6dd;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;letter-spacing:.06em}
.tour-spk b{color:#cfeeff}
.tour-orb{width:18px;height:18px;border-radius:50%;background:radial-gradient(closest-side at 38% 32%,#eafaff,#38e1ff 40%,#4f8cff);box-shadow:0 0 12px rgba(56,225,255,.7)}
.tour-title{font-size:17px;font-weight:800;margin:11px 0 6px;letter-spacing:-.2px}
.tour-text{font-size:14px;line-height:1.55;color:var(--txt-dim)}
.tour-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:16px;flex-wrap:wrap}
.tour-dots{display:flex;gap:5px}
.tour-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);transition:.3s}
.tour-dots span.on{width:18px;background:var(--grad)}
.tour-btns{display:flex;gap:8px;margin-left:auto}
.tour-btns .btn{padding:9px 14px;font-size:13px}
.tour-card.tour-final{width:min(420px,92vw);text-align:center;padding:32px 28px}
.tour-final-head{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;letter-spacing:.42em;font-size:12px;color:#6fcdf0;text-shadow:0 0 12px rgba(56,225,255,.6)}
.tour-final-title{font-size:24px;font-weight:900;letter-spacing:.05em;margin:14px 0 20px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.tour-final-k{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.28em;color:#7fa6cc}
.tour-final-obj{font-size:18px;font-weight:700;margin:7px 0 6px}
.tour-final-reward{font-family:ui-monospace,monospace;color:var(--amber);font-weight:700;letter-spacing:.12em;font-size:13px}

/* ============================================================
   AWAKENING SEQUENCE
   ============================================================ */
#awakening{position:fixed;inset:0;z-index:200;background:#000;display:grid;place-items:center;color:#dff0ff;overflow:hidden;opacity:0;transition:opacity .8s ease}
#awakening.on{opacity:1}
#awakening.out{opacity:0 !important;transition:opacity .9s ease}
#awkCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:0}
.awk-grid{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    linear-gradient(rgba(56,225,255,.045) 1px, transparent 1px) 0 0/100% 44px,
    radial-gradient(circle at 50% 50%, rgba(56,140,255,.12), transparent 62%);
  animation:awkGridPulse 6s ease-in-out infinite}
@keyframes awkGridPulse{0%,100%{opacity:.45}50%{opacity:.85}}
.awk-center{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;width:100%}
.awk-msg{position:absolute;left:50%;top:50%;transform:translate(-50%,calc(-50% + 10px));
  font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  font-size:clamp(15px,3.2vw,24px);letter-spacing:.3em;text-transform:uppercase;color:#9fe6ff;
  text-shadow:0 0 18px rgba(56,225,255,.7);opacity:0;transition:opacity .55s ease, transform .55s ease;
  max-width:92vw;line-height:1.5}
.awk-msg.show{opacity:1;transform:translate(-50%,-50%)}

.awk-reveal{opacity:0;transition:opacity .6s ease}
.awk-reveal.show{opacity:1}
.awk-title{font-size:clamp(40px,11vw,118px);font-weight:900;letter-spacing:.05em;line-height:1;
  background:linear-gradient(180deg,#eafaff,#7ec8ff 55%,#4f8cff);-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:blur(20px);opacity:0;transform:scale(1.28);
  transition:filter 2.2s cubic-bezier(.2,.7,.2,1), opacity 2.2s ease, transform 2.4s cubic-bezier(.2,.7,.2,1)}
.awk-reveal.show .awk-title{filter:blur(0);opacity:1;transform:scale(1);animation:awkGlow 3.4s ease-in-out .8s infinite}
@keyframes awkGlow{0%,100%{filter:drop-shadow(0 0 22px rgba(79,140,255,.55))}50%{filter:drop-shadow(0 0 48px rgba(56,225,255,.9))}}
.awk-sub{margin-top:22px;font-size:clamp(15px,2.6vw,20px);color:#bcd6f5;letter-spacing:.02em;
  opacity:0;transform:translateY(10px);transition:opacity 1.1s ease, transform 1.1s ease}
.awk-sub.show{opacity:1;transform:translateY(0)}
.awk-sub b{color:#fff;font-weight:700}

.awk-panel{margin-top:38px;width:min(370px,86vw);padding:24px;
  border:1px solid rgba(56,225,255,.25);box-shadow:0 0 44px rgba(56,140,255,.28), inset 0 0 30px rgba(56,225,255,.05);
  opacity:0;transform:translateY(24px) scale(.95);transition:opacity .8s ease, transform .8s cubic-bezier(.2,.8,.2,1)}
.awk-panel.show{opacity:1;transform:translateY(0) scale(1);animation:awkFloat 5s ease-in-out 1s infinite}
@keyframes awkFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.awk-ph{font-family:ui-monospace,monospace;letter-spacing:.42em;font-size:12px;color:#6fcdf0;text-align:center;margin-bottom:16px;text-shadow:0 0 12px rgba(56,225,255,.6)}
.awk-stat{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.08);font-family:ui-monospace,monospace;letter-spacing:.12em;font-size:13px}
.awk-stat span{color:#8fb3d6}.awk-stat b{color:#fff;font-size:15px}
.awk-quest{margin-top:14px;text-align:left}
.awk-k{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.3em;color:#6fa8cf}
.awk-v{font-size:16px;font-weight:600;margin-top:3px;color:#eaf6ff}
.awk-v.reward{color:var(--amber);font-weight:700}
.awk-enter{width:100%;margin-top:20px;letter-spacing:.16em;font-family:ui-monospace,monospace;font-size:14px}
.awk-skip{position:absolute;z-index:3;bottom:20px;right:22px;font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.2em;color:#5d7896;background:transparent;border:1px solid rgba(255,255,255,.12);padding:8px 14px;border-radius:10px;transition:.2s}
.awk-skip:hover{color:#9fe6ff;border-color:rgba(56,225,255,.4)}
@media(prefers-reduced-motion:reduce){
  .awk-title{transition-duration:.5s}
  .awk-reveal.show .awk-title{animation:none;filter:drop-shadow(0 0 30px rgba(56,225,255,.7))}
  .awk-grid,.awk-panel.show{animation:none}
}

/* ============================================================
   MOBILE / PWA OPTIMIZATION (phones, installed app)
   ============================================================ */
@media (max-width:760px){
  .wrap{padding-left:15px;padding-right:15px}

  /* top bar clears the status bar / notch.
     NOTE: backdrop-filter must be off here, else it becomes the containing
     block for the fixed bottom nav and bottom:0 would anchor to the bar. */
  .topbar{padding-top:calc(12px + env(safe-area-inset-top));padding-bottom:11px;gap:8px;
    backdrop-filter:none;-webkit-backdrop-filter:none;background:rgba(8,11,20,.97)}
  .topbar .mark{font-size:19px}
  .lvl-chip .mini-bar{width:60px}

  /* primary navigation moves to a fixed bottom bar (native-app style) */
  .nav{position:fixed;left:0;right:0;bottom:0;margin:0;gap:0;justify-content:space-around;align-items:stretch;
    background:rgba(8,11,20,.94);backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);
    border-top:1px solid var(--stroke);padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:95}
  .nav-item{flex:1 1 0;min-width:0;flex-direction:column;gap:3px;padding:6px 2px;border-radius:12px;border:none;color:var(--txt-faint)}
  .nav-item:hover{background:transparent}
  .nav-item .ni-em{font-size:21px;opacity:1}
  .nav-item .ni-nm{display:none}
  .nav-item.on{background:transparent;border:none;box-shadow:none;color:#7fe0ff}
  .nav-item.on::after{display:none}
  .nav-item.on .ni-nm{display:block;font-size:9px;letter-spacing:0;line-height:1;white-space:nowrap}

  /* keep page content above the bottom bar */
  .dash-body,.page-body{padding-bottom:calc(94px + env(safe-area-inset-bottom))}

  /* hero a touch tighter on small screens */
  .hero-inner{padding-top:16px;padding-bottom:22px}
  .sys-status{font-size:clamp(18px,6vw,30px);margin-bottom:16px}

  /* bottom-anchored UI clears the system nav bar */
  .awk-skip{bottom:calc(20px + env(safe-area-inset-bottom))}
  .toasts{top:calc(68px + env(safe-area-inset-top))}
  .modal,.chat-modal{margin-bottom:env(safe-area-inset-bottom)}
}

/* ============================================================
   ECHO — app logic
   ============================================================ */
const $ = (s,r=document)=>r.querySelector(s);

// NOTE: a client-side key is visible to anyone who opens the page; rotate + domain-restrict before any public launch.
const EMBEDDED_GEMINI_KEY = "AIzaSyCW4AQWTkxjE7OThvc7K0AJ3mLjxbC0_PM";

/* ============================================================
   SOUND EFFECTS — synthesized (Web Audio, zero asset files)
   ============================================================ */
let _ac=null, _sfxMaster=null;
let sfxOn = (localStorage.getItem("echo_sfx")!=="0");
function sfxInit(){
  if(_ac) return;
  try{ const C=window.AudioContext||window.webkitAudioContext; if(!C) return;
    _ac=new C(); _sfxMaster=_ac.createGain(); _sfxMaster.gain.value=0.16; _sfxMaster.connect(_ac.destination);
  }catch(e){}
}
function _note(freq,start,dur,opts){
  opts=opts||{};
  const o=_ac.createOscillator(), g=_ac.createGain();
  o.type=opts.type||"sine"; o.frequency.setValueAtTime(freq,start);
  if(opts.glide) o.frequency.exponentialRampToValueAtTime(opts.glide,start+dur);
  g.gain.setValueAtTime(0.0001,start);
  g.gain.exponentialRampToValueAtTime(opts.vol||0.5,start+0.006);
  g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
  o.connect(g); g.connect(_sfxMaster); o.start(start); o.stop(start+dur+0.03);
}
function sfx(name){
  if(!sfxOn) return; sfxInit(); if(!_ac) return;
  if(_ac.state==="suspended"){ try{_ac.resume();}catch(e){} }
  const t=_ac.currentTime+0.001;
  switch(name){
    case "tap":   _note(420,t,0.05,{type:"triangle",vol:0.20}); break;
    case "nav":   _note(540,t,0.09,{type:"sine",vol:0.30,glide:700}); break;
    case "toggle":_note(660,t,0.06,{type:"square",vol:0.24}); break;
    case "ding":  _note(880,t,0.12,{vol:0.4}); _note(1320,t+0.02,0.12,{vol:0.2}); break;
    case "complete": _note(660,t,0.1,{type:"triangle",vol:0.4}); _note(990,t+0.08,0.15,{type:"triangle",vol:0.4}); break;
    case "quest": [523,659,880].forEach((f,i)=>_note(f,t+i*0.07,0.14,{type:"triangle",vol:0.34})); break;
    case "unlock":_note(740,t,0.16,{vol:0.34,glide:1480}); _note(1110,t+0.06,0.24,{vol:0.22}); break;
    case "start": _note(330,t,0.18,{vol:0.35,glide:460}); break;
    case "sessioncomplete": [523,784,1046].forEach((f,i)=>_note(f,t+i*0.09,0.2,{vol:0.38})); break;
    case "levelup": [523,659,784,1046,1318].forEach((f,i)=>_note(f,t+i*0.08,0.26,{type:"triangle",vol:0.4})); break;
    case "boss":  _note(170,t,0.22,{type:"sawtooth",vol:0.34,glide:90}); [392,523,784].forEach((f,i)=>_note(f,t+0.14+i*0.1,0.26,{type:"square",vol:0.3})); break;
    case "error": _note(200,t,0.18,{type:"sawtooth",vol:0.3,glide:120}); break;
    default: _note(500,t,0.06,{vol:0.25});
  }
}

/* ---------- unlockable Echo skins (to flex on leaderboards) ---------- */

const _titlesOwned = s=>((s.titles&&s.titles.unlocked)||[]).length;

// rarer skins require MULTIPLE harder conditions
const SPECIAL_SKINS = [

  {id:"solar",       nm:"Solar Flare",    rarity:"Epic",      fx:"skin-solar",      grad:"radial-gradient(closest-side at 38% 32%,#fff6e0,#ffd27a 30%,#ff7a3d 70%,#c23a1f)",    req:"50 sessions + 1,000 Discipline",                  test:s=>_ss(s,"sessions")>=50 && _sk(s,"discipline")>=1000},
  {id:"abyss",       nm:"Abyssal",        rarity:"Epic",      fx:"skin-abyss",      grad:"radial-gradient(closest-side at 40% 34%,#9fd0ff,#2a6fd0 42%,#0a1a3a 80%,#04081a)",    req:"C-Rank + conquer 3 dungeons",                     test:s=>_rankAtLeast(s,"C") && _ss(s,"bossesDefeated")>=3},
  {id:"glacier",     nm:"Glacier",        rarity:"Legendary", fx:"skin-glacier",    grad:"radial-gradient(closest-side at 38% 32%,#ffffff,#cdfaff 32%,#7ad6ff 66%,#2a7fd0)",    req:"60-day streak + 2,000 Discipline",                test:s=>s.streak.longest>=60 && _sk(s,"discipline")>=2000},

  {id:"singularity", nm:"Singularity",    rarity:"Mythic",    fx:"skin-singularity",grad:"radial-gradient(closest-side at 50% 50%,#000 44%,#7aa2ff 54%,#38e1ff 66%,#04081a)",   req:"S-Rank + 3 Mythic titles + 300 sessions",         test:s=>_rankAtLeast(s,"S") && _mythicTitles(s)>=3 && _ss(s,"sessions")>=300},
  {id:"ascendant",   nm:"Ascendant Core", rarity:"Mythic",    fx:"skin-ascendant",  grad:"radial-gradient(closest-side at 38% 32%,#fffdf0,#ffe08a 30%,#ffab3d 60%,#ff5d3d 85%)", req:"National Level + 5 Mythic titles + 500,000 XP",   test:s=>_rankAtLeast(s,"National") && _mythicTitles(s)>=5 && s.rpg.totalXP>=500000},
  {id:"limitless",   nm:"Limitless",      rarity:"Divine",    fx:"skin-limitless",  grad:"radial-gradient(closest-side at 42% 38%,#ffd2d2,#ff5a5a 26%,#d4142a 58%,#4a0010 92%)", req:"Developer exclusive",                  test:s=>!!s.dev, devOnly:true},
];
const SKINS = AVATARS.map(a=>({...a, rarity:"Common", fx:"", req:"Starter skin", test:()=>true})).concat(SPECIAL_SKINS);
function skinById(id){ return SKINS.find(s=>s.id===id) || SKINS[0]; }
function currentSkin(){ return skinById(S.profile.avatar); }
function companionOrbClass(){ const sk=currentSkin(); return "orb mood-"+S.comp.mood+(sk.fx?(" "+sk.fx):""); }

// red core + three orbiting glowing energy shards (original dev-skin effect)
function limitlessAura(inner,size){
  const shard=`<path d="M0 -10 L3.4 -1 L0 9 L-3.4 -1 Z" fill="#fff" opacity="0.95"/>`;
  return `<div class="echo-aura" style="width:${size}px;height:${size}px">${inner}
    <svg class="echo-tomoe" viewBox="0 0 100 100" aria-hidden="true"><g class="tomoe-rot">
      <g transform="rotate(0 50 50)"><g transform="translate(50 12)">${shard}</g></g>
      <g transform="rotate(120 50 50)"><g transform="translate(50 12)">${shard}</g></g>
      <g transform="rotate(240 50 50)"><g transform="translate(50 12)">${shard}</g></g>
    </g></svg></div>`;
}
// render any orb skin at a given size; locked → desaturated
function skinVisual(sk,size,locked){
  const orb=`<div class="orb ${locked?'':(sk.fx||'')}" style="width:${size}px;height:${size}px;background:${sk.grad};${locked?'filter:grayscale(.85) brightness(.55)':''}"></div>`;
  return (sk.id==="limitless" && !locked && size>=70) ? limitlessAura(orb,size) : orb;
}
// the equipped companion element (with mood + #id for live mood updates)
function companionEl(size,id){
  const sk=currentSkin();

  return (sk.id==="limitless" && size>=70) ? limitlessAura(orb,size) : orb;

/* ============================================================
   100 ECHOS — designed orbs (distinct patterns, not just colors)
   ============================================================ */
// palettes: [highlight, mid, deep, accent]
const ECHO_PAL = [
  {nm:"Aurora",  c:["#eafaff","#38e1ff","#2a4bd0","#7aa2ff"]},
  {nm:"Ember",   c:["#fff6e0","#ffc24b","#d65a1f","#ff8a3d"]},
  {nm:"Verdant", c:["#eaffea","#7cf0a0","#0c8a4a","#2dd46f"]},
  {nm:"Crimson", c:["#ffe9e9","#ff8a8a","#8a1f2a","#e63946"]},
  {nm:"Amethyst",c:["#fff","#c9b6ff","#4a2b9e","#9b6aff"]},
  {nm:"Glacier", c:["#ffffff","#cdfaff","#2a7fd0","#7ad6ff"]},

  {nm:"Obsidian",c:["#8fa0c0","#3a4660","#05060c","#161c2c"]},
];
// designs: simple → complex (rarer skins get fancier designs)
const ECHO_DES = [
  {nm:"Orb",      fx:"",          g:c=>`radial-gradient(closest-side at 38% 32%, ${c[0]}, ${c[1]} 34%, ${c[2]} 80%, ${c[3]})`},
  {nm:"Split",    fx:"",          g:c=>`radial-gradient(closest-side at 30% 28%, ${c[0]}, transparent 55%), linear-gradient(135deg, ${c[1]}, ${c[3]} 55%, ${c[2]})`},

function _echoRar(i,n){ const f=i/n; return f<0.30?"Common":f<0.55?"Uncommon":f<0.75?"Rare":f<0.90?"Epic":f<0.97?"Legendary":"Mythic"; }
(function buildEchos(){
  const TARGET=100, base=SKINS.length, need=TARGET-base; // fill the rest as designed orbs
  const seen=new Set(SKINS.map(s=>s.nm));
  const rarCnt={};
  for(let i=0;i<need;i++){
    const des=ECHO_DES[Math.floor(i/Math.ceil(need/ECHO_DES.length))%ECHO_DES.length];
    const pal=ECHO_PAL[(i*7)%ECHO_PAL.length];
    const rar=_echoRar(i,need);
    const k=(rarCnt[rar]=(rarCnt[rar]||0)+1);
    let req,test;
    if(rar==="Common"){ const xp=500*k; req=`Earn ${xp.toLocaleString()} XP`; test=s=>s.rpg.totalXP>=xp; }
    else if(rar==="Uncommon"){ const L=4+k; req=`Reach Level ${L}`; test=s=>_L(s)>=L; }
    else if(rar==="Rare"){ const ss=12*k; req=`Complete ${ss} focus sessions`; test=s=>_ss(s,"sessions")>=ss; }
    else if(rar==="Epic"){ const L=35+3*k, ds=800+200*k; req=`Level ${L} + ${ds.toLocaleString()} Discipline`; test=s=>_L(s)>=L&&_sk(s,"discipline")>=ds; }

    else { const mt=2+k, xp=300000+150000*k; req=`S-Rank + ${mt} Mythic titles + ${xp.toLocaleString()} XP`; test=s=>_rankAtLeast(s,"S")&&_mythicTitles(s)>=mt&&s.rpg.totalXP>=xp; }
    let nm=`${pal.nm} ${des.nm}`, x=2; while(seen.has(nm)){ nm=`${pal.nm} ${des.nm} ${x++}`; } seen.add(nm);
    SKINS.push({ id:"sk"+i, nm, rarity:rar, fx:des.fx, grad:des.g(pal.c), req, test });
  }
})();

const TITLES = [];
const _seen = new Set();
let _tid = 0;
function uniqueName(n){ let nm=n, i=2; while(_seen.has(nm)){ nm=n+" "+("II III IV V VI VII VIII IX X".split(" ")[i-2]||("#"+i)); i++; } _seen.add(nm); return nm; }
function T(name, cat, rarity, desc, test, hidden, req){
  TITLES.push({ id:"T"+(_tid++), name:uniqueName(name), cat, rarity, desc:desc||"", test:test||(()=>false), hidden:!!hidden, req:req||"" });
}
// metric helpers (operate on a state object s)
const _L  = s=>levelFromTotal(s.rpg.totalXP).level;
const _sk = (s,k)=>(s.rpg.skills&&s.rpg.skills[k])||0;
const _ss = (s,k)=>(s.stats&&s.stats[k])||0;
const _allSkills = (s,n)=>["knowledge","discipline","focus","fitness","creativity","social"].every(k=>_sk(s,k)>=n);
function _metric(s,k){
  switch(k){
    case "level": return _L(s);
    case "totalXP": return s.rpg.totalXP;
    case "streak": return s.streak.longest;
    case "sessions": return _ss(s,"sessions");
    case "tasks": return _ss(s,"tasksDone");
    case "quests": return _ss(s,"questsCompleted");
    case "dungeons": return _ss(s,"bossesDefeated");
    case "chats": return _ss(s,"chats");
    case "focusMin": return _ss(s,"focusMinutes");
    case "goals": return _ss(s,"goalsCreated");
    case "habit": return _ss(s,"bestHabitStreak");
    default: return _sk(s,k);
  }
}

/* ---------- HUNTER RANKS (Solo-Leveling style, by level) ---------- */
// E 1–19 · D 20–39 · C 40–59 · B 60–79 · A 80–99 · S 100–124 · National 125+
function rankFromLevel(L){
  if(L>=125) return "National";
  if(L>=100) return "S";
  if(L>=80)  return "A";
  if(L>=60)  return "B";
  if(L>=40)  return "C";
  if(L>=20)  return "D";
  return "E";
}
const RANK_META = {
  "E":{label:"E-Rank", c:"#9fb0cf"},
  "D":{label:"D-Rank", c:"#46e6a0"},
  "C":{label:"C-Rank", c:"#38e1ff"},
  "B":{label:"B-Rank", c:"#4f8cff"},
  "A":{label:"A-Rank", c:"#b59bff"},
  "S":{label:"S-Rank", c:"#ffc24b"},
  "National":{label:"National Level", c:"#ff5d7e"},
};
const RANK_ORDER = ["E","D","C","B","A","S","National"];
const RANK_THRESHOLDS = {E:1, D:20, C:40, B:60, A:80, S:100, National:125};
// next rank + level needed (null if already National)
function nextRankInfo(L){
  const cur=rankFromLevel(L);
  const idx=RANK_ORDER.indexOf(cur);
  if(idx>=RANK_ORDER.length-1) return null;
  const next=RANK_ORDER[idx+1];
  return { rank:next, label:RANK_META[next].label, atLevel:RANK_THRESHOLDS[next], levelsAway:RANK_THRESHOLDS[next]-L };
}
// the rank chip used in hero + profile
function rankChip(L){
  const r=rankFromLevel(L), m=RANK_META[r];
  return `<span class="hl-rank rank-${r}" style="color:${m.c};border-color:${m.c}55;box-shadow:0 0 16px ${m.c}33">RANK · ${m.label.toUpperCase()}</span>`;
}

/* ---------- XP / leveling ---------- */
// XP needed to go from level L to L+1 = 100 + (L-1)*40  (gentle ramp)
function xpForLevel(L){ return 100 + (L-1)*40; }
function levelFromTotal(total){
  let L=1, rem=total;
  while(rem >= xpForLevel(L)){ rem -= xpForLevel(L); L++; }
  return {level:L, intoLevel:rem, need:xpForLevel(L)};
}

/* ============================================================
   QUEST / STREAK MAINTENANCE
   ============================================================ */
// bring older saved states up to the current shape
function ensureShape(){
  if(!S) return;
  S.rpg = S.rpg || {totalXP:0, skills:{}};
  S.rpg.skills = S.rpg.skills || {};
  ["knowledge","discipline","focus","fitness","creativity","social"].forEach(k=>{ if(typeof S.rpg.skills[k]!=="number") S.rpg.skills[k]=0; });
  S.stats = S.stats || {};
  ["sessions","tasksDone","bossesDefeated","questsCompleted","focusMinutes","longestSession","nightSessions","earlySessions","goalsCreated","chats","perfectDays","bestHabitStreak"].forEach(k=>{ if(typeof S.stats[k]!=="number") S.stats[k]=0; });
  S.achievements = S.achievements || [];
  S.tasks = S.tasks || [];
  S.dailies = S.dailies || [];
  // a daily task's streak breaks if it was missed for more than a day
  S.dailies.forEach(d=>{ if(d.lastDone){ const days=Math.round((new Date(todayStr())-new Date(d.lastDone))/86400000); if(days>1) d.streak=0; } });
  S.dev = (localStorage.getItem("echo_dev")==="1"); // developer-exclusive unlocks (e.g. the Limitless skin)
  S.titles = S.titles || { unlocked:[], primary:null, secondary:null, favorites:[] };
  S.titles.unlocked = S.titles.unlocked || [];
  S.titles.favorites = S.titles.favorites || [];
  (S.goals||[]).forEach(g=>{ if(!Array.isArray(g.subtasks)) g.subtasks=[]; if(typeof g.defeated!=="boolean") g.defeated=false; if(!g.icon) g.icon="🏰"; });
}
function maintain(){
  if(!S) return;
  ensureShape();
  // daily reset
  if(S.quests.dailyReset !== todayStr()){
    S.quests.daily = freshDailyQuests();
    S.quests.dailyReset = todayStr();
  }
  // weekly reset
  if(S.quests.weeklyReset !== weekKey()){
    S.quests.weekly = freshWeeklyQuests();
    S.quests.weeklyReset = weekKey();
  }
  if(S.weekKeyAt !== weekKey()){ S.weekXP=0; S.weekKeyAt=weekKey(); }
  // streak decay if missed a day
  if(S.streak.lastActive){
    const last=new Date(S.streak.lastActive), now=new Date(todayStr());
    const days=Math.round((now-last)/86400000);
    if(days>1){ S.streak.current=0; }
  }
  if(S.titles) checkTitles(true); // sync unlocked titles silently
  save();
}

function bumpStreak(){
  const t=todayStr();
  if(S.streak.lastActive===t) return; // already counted today
  const last=S.streak.lastActive ? new Date(S.streak.lastActive):null;
  const now=new Date(t);
  if(last){
    const days=Math.round((now-last)/86400000);
    S.streak.current = days===1 ? S.streak.current+1 : 1;
  }else{ S.streak.current=1; }
  S.streak.lastActive=t;
  S.streak.longest=Math.max(S.streak.longest, S.streak.current);
  // weekly streak quest
  updateQuest("w_streak3", S.streak.current, true);
}

/* ============================================================
   XP ENGINE
   ============================================================ */
// passive XP bonus from equipped titles (their special effect)
function titleXpPct(t){ return t ? ({Common:0,Uncommon:1,Rare:2,Epic:3,Legendary:5,Mythic:8}[t.rarity]||0) : 0; }
function xpBonusPct(){
  if(!S.titles) return 0;
  return titleXpPct(titleById(S.titles.primary)) + titleXpPct(titleById(S.titles.secondary));
}
// low-level: just move the numbers (applies equipped-title XP bonus), no side effects
function creditXP(amount, skill){
  amount = Math.round(amount * (1 + xpBonusPct()/100));
  S.rpg.totalXP += amount;
  if(skill) S.rpg.skills[skill]=(S.rpg.skills[skill]||0)+amount;
  S.weekXP += amount;
}
// run a block of XP-granting work as one transaction, then detect any level-up
// (works no matter which source — session XP, quest rewards, etc. — granted the XP)
function withLevelCheck(fn){
  const before = levelFromTotal(S.rpg.totalXP).level;
  fn();
  updateQuest("w_xp500", S.weekXP, true); // keep weekly-XP quest in sync after all credits
  const after = levelFromTotal(S.rpg.totalXP).level;
  save();
  if(after>before){ setTimeout(()=>celebrateLevel(after), 650); }
  return after>before;
}
function addXP(amount, skill, source){
  return withLevelCheck(()=>{ creditXP(amount, skill); logActivity(source, amount); });
}
function logActivity(label, xp){
  S.activity.unshift({ label, xp, ts:Date.now() });
  S.activity = S.activity.slice(0,12);
}

/* quest progress: setTo = absolute value if abs true, else increment */
function updateQuest(id, val, abs){
  ["daily","weekly"].forEach(grp=>{
    const q=S.quests[grp].find(x=>x.id===id);
    if(!q||q.done) return;
    q.prog = abs ? Math.max(q.prog, val) : q.prog+val;
    if(q.prog>=q.goal){
      q.prog=q.goal; q.done=true;
      if(S.stats) S.stats.questsCompleted=(S.stats.questsCompleted||0)+1;
      creditXP(q.xp); // level-up detected by the enclosing withLevelCheck transaction
      logActivity("Quest complete: "+q.t, q.xp);
      sfx("quest");
      toast("🏆","Quest complete!", q.t+" · +"+q.xp+" XP");
    }
  });
}
